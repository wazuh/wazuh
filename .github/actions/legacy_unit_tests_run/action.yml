name: "Legacy unit tests run for Wazuh"
description: "This action runs Wazuh unit tests on Ubuntu Linux/Windows"
inputs:
   target:
     required: true
     description: "Target specifies whether the build is for Linux or Windows"
   bucket:
     required: false
     default: ""
     description: "Target S3 bucket URI for the coverage artifact (pass the CI_INTERNAL_S3_BUCKET secret)."
   aws_role:
     required: false
     default: ""
     description: "OIDC IAM role to assume for S3 access (pass the CI_OIDC_ROLE_ARN secret)."
   aws_region:
     required: false
     default: "us-east-1"
     description: "AWS region (pass the CI_AWS_REGION secret)."
runs:
  using: "composite"
  steps:
    - name: Set permissions and prepare the library
      shell: bash
      run: |
        chmod +x .github/actions/legacy_unit_tests.sh
    - name: Build Wazuh Agent Unit Tests
      shell: bash
      run: |
        source .github/actions/legacy_unit_tests.sh
        run_wazuh_unit_tests ${{ inputs.target }}
    - name: Format and Display Test Results
      shell: bash
      run: |
        source .github/actions/legacy_unit_tests.sh
        format_display_test_results ${{ inputs.target }}
    - name: Format and Display Test Coverage
      shell: bash
      run: |
        source .github/actions/legacy_unit_tests.sh
        format_display_test_coverage ${{ inputs.target }}
    - name: Upload coverage artifacts
      if: always()
      uses: ./.github/actions/upload_s3_artifact
      with:
        name: legacy-unit-tests-coverage-${{ inputs.target }}
        path: |
          src/unit_tests/build/coverage_results.txt
          src/unit_tests/build/test_results.txt
          src/unit_tests/build/coverage.info*
          src/unit_tests/build/coverage-report/
        bucket: ${{ inputs.bucket }}
        aws_role: ${{ inputs.aws_role }}
        aws_region: ${{ inputs.aws_region }}
