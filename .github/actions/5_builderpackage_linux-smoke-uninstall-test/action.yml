name: 'Test uninstall Wazuh agent package'
description: 'Test uninstall Wazuh agent package'

inputs:
  tested_docker:
    description: 'image:tag of tested Docker'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Run test uninstall Wazuh agent package
      shell: bash
      env:
        INPUT_TESTED_DOCKER: ${{ inputs.tested_docker }}
      run: |
        sudo docker run \
          -v "${{ github.action_path }}/:/tests" \
          -v /tmp/:/packages \
          --entrypoint '/tests/smoke_uninstall_test.sh' \
          "$INPUT_TESTED_DOCKER"
