name: 5.X - Code Linter - ClangFormat

on:
  workflow_dispatch:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check-files:
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if only CHANGELOG.md was modified
        id: check
        run: |
          # Get the list of modified files in the PR
          git fetch origin ${{ github.event.pull_request.base.ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)

          echo "Files changed in this PR:"
          echo "$CHANGED_FILES"
          echo ""

          # Count total files changed
          TOTAL_FILES=$(echo "$CHANGED_FILES" | wc -l)

          # Check if CHANGELOG.md is the only file changed
          if [ "$TOTAL_FILES" -eq 1 ] && echo "$CHANGED_FILES" | grep -q "^CHANGELOG.md$"; then
            echo "Only CHANGELOG.md was modified. Skipping clang-format check."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "Code files were modified. Running clang-format check."
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  style:
    runs-on: ubuntu-24.04
    needs: check-files
    if: needs.check-files.outputs.should_run == 'true'

    steps:
      - name: Cancel previous runs
        uses: fkirc/skip-duplicate-actions@master
        with:
          cancel_others: 'true'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_after_successful_duplicate: 'false'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Router
      - name: Router - Coding style
        id: router_style
        continue-on-error: true
        uses: ./.github/actions/clang_format
        with:
          path: src/shared_modules/router
          id: router

      # Indexer Connector
      - name: Indexer connector - Coding style
        id: indexer_connector_style
        continue-on-error: true
        uses: ./.github/actions/clang_format
        with:
          path: src/shared_modules/indexer_connector
          id: indexer_connector

      # Content Manager
      - name: Content manager - Coding style
        id: content_manager_style
        continue-on-error: true
        uses: ./.github/actions/clang_format
        with:
          path: src/shared_modules/content_manager
          id: content_manager

      # Inventory Sync
      - name: Inventory sync - Coding style
        id: inventory_sync_style
        continue-on-error: true
        uses: ./.github/actions/clang_format
        with:
          path: src/wazuh_modules/inventory_sync
          id: inventory_sync

      # Vulnerability Scanner
      - name: Vulnerability scanner - Coding style
        id: vulnerability_scanner_style
        continue-on-error: true
        uses: ./.github/actions/clang_format
        with:
          path: src/wazuh_modules/vulnerability_scanner
          id: vulnerability_scanner

      # Utils
      - name: Utils - Coding style
        id: utils_style
        continue-on-error: true
        uses: ./.github/actions/clang_format
        with:
          path: src/shared_modules/utils
          id: utils

      - name: Check all coding style results
        if: always()
        run: |
          FAILED_STEPS=""

          if [ "${{ steps.router_style.outcome }}" != "success" ]; then
            FAILED_STEPS="$FAILED_STEPS Router"
          fi

          if [ "${{ steps.indexer_connector_style.outcome }}" != "success" ]; then
            FAILED_STEPS="$FAILED_STEPS IndexerConnector"
          fi

          if [ "${{ steps.content_manager_style.outcome }}" != "success" ]; then
            FAILED_STEPS="$FAILED_STEPS ContentManager"
          fi

          if [ "${{ steps.inventory_sync_style.outcome }}" != "success" ]; then
            FAILED_STEPS="$FAILED_STEPS InventorySync"
          fi

          if [ "${{ steps.vulnerability_scanner_style.outcome }}" != "success" ]; then
            FAILED_STEPS="$FAILED_STEPS VulnerabilityScanner"
          fi

          if [ "${{ steps.utils_style.outcome }}" != "success" ]; then
            FAILED_STEPS="$FAILED_STEPS Utils"
          fi

          if [ -n "$FAILED_STEPS" ]; then
            echo "❌ The following modules failed coding style verification:$FAILED_STEPS"
            exit 1
          else
            echo "✅ All modules passed coding style verification"
          fi
