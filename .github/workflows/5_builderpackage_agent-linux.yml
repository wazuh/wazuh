      - name: CodeBuild workarounds
        # TODO: Remove once DevOps exposes host Docker socket or configures DinD in CodeBuild
        run: |
          # 1. Docker daemon: CodeBuild has no systemd so dockerd never starts.
          #    VFS storage driver avoids overlay-on-overlay which is not supported inside containers.
          if ! docker info &>/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
            sudo nohup dockerd --storage-driver vfs > /var/log/dockerd.log 2>&1 &
            timeout 60 bash -c 'until docker info &>/dev/null 2>&1; do sleep 1; done'
            sudo chmod 666 /var/run/docker.sock
          fi
          # 2. Git repo format: actions/checkout on newer git writes repositoryformatversion=1
          #    which the older git inside builder Docker images cannot read.
          git config core.repositoryformatversion 0
          # Install uuidgen
          if ! command -v uuidgen >/dev/null 2>&1; then
            sudo apt-get install -y uuid-runtime
          fi
          # 3. pip: the get-last-stable-version / get-upgrade-test-package-url actions
          #    install requests/packaging via pip, which the CodeBuild image lacks.
          if ! python3 -m pip --version >/dev/null 2>&1; then
            sudo apt-get install -y python3-pip
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.CI_WAZUHCI_DOCKERHUB_USER }}
          password: ${{ secrets.CI_WAZUHCI_DOCKERHUB_TOKEN }}

      - name: Download docker image for package building
        run: |
          bash .github/actions/ghcr-pull-and-push/pull_image_from_ghcr.sh "${{ secrets.CI_WAZUH_AGENT_PACKAGES_CLASSIC }}" "${{ github.actor }}" "$CONTAINER_NAME" "$TAG"

      - name: Append short commit to VERSION file
        run: |
          SHORT_COMMIT=$(git rev-parse --short=7 HEAD)
          if [ -z "$SHORT_COMMIT" ]; then echo "No commit found"; exit 1; fi
          echo "Found commit: $SHORT_COMMIT"
          sed -i '/"stage":/s/$/,/; /"stage":/a \    "commit": "'"$SHORT_COMMIT"'"' VERSION.json || exit 1
          cat VERSION.json

      - name: Build package
        id: build
        env:
          INPUT_REVISION: ${{ inputs.revision || '0' }}
        run: |
          REVISION="$INPUT_REVISION"
          FLAGS="--verbose -t agent -s /tmp --dont-build-docker -j $(nproc) "
          FLAGS+="-r $REVISION "
          if [ "${{ inputs.checksum }}" == "true" ]; then FLAGS+="--checksum "; fi
          if [ "${{ inputs.debug }}" == "true" ]; then FLAGS+="--debug "; fi
          echo "generate_package.sh -a ${{ env.ARCH }} --tag ${{ env.TAG }} --system ${{ env.SYSTEM }} $FLAGS"
          bash packages/generate_package.sh -a "${{ env.ARCH }}" --tag "${{ env.TAG }}" --system "${{ env.SYSTEM }}" $FLAGS

          if [ "${{ matrix.system }}" == "deb" ]; then
            PACKAGE_NAME=$(find /tmp -maxdepth 1 -type f -name "*agent*.deb" -exec basename {} 2>/dev/null \; | grep -v -E "^wazuh-agent-dbg")
            PACKAGE_SYMBOLS_NAME=$(find /tmp -maxdepth 1 -type f -name "*agent*.deb" -exec basename {} 2>/dev/null \; | grep -E "^wazuh-agent-dbg")
          else
            PACKAGE_NAME=$(find /tmp -maxdepth 1 -type f -name "*agent*.rpm" -exec basename {} 2>/dev/null \; | grep -v -E "^wazuh-agent-debuginfo")
            PACKAGE_SYMBOLS_NAME=$(find /tmp -maxdepth 1 -type f -name "*agent*.rpm" -exec basename {} 2>/dev/null \; | grep -E "^wazuh-agent-debuginfo")
          fi

          cat <<EOF | sed -e 's/^[[:space:]]*//' > /tmp/metadata.env
          PACKAGE_NAME=$PACKAGE_NAME
          PACKAGE_SYMBOLS_NAME=$PACKAGE_SYMBOLS_NAME
          VERSION=${{ env.VERSION }}
          CONTAINER_NAME=${{ env.CONTAINER_NAME }}
          TAG=${{ env.TAG }}
          SYSTEM=${{ matrix.system }}
          EOF

          cat <<EOF | sed -e 's/^[[:space:]]*//' -e 's/\r$//' >> $GITHUB_ENV
          PACKAGE_NAME=$PACKAGE_NAME
          PACKAGE_SYMBOLS_NAME=$PACKAGE_SYMBOLS_NAME
          EOF

      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: metadata-${{ matrix.system }}-${{ matrix.arch }}
          path: /tmp/metadata.env
          retention-days: 1

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: /tmp/${{ env.PACKAGE_NAME }}
          retention-days: 7

      - name: Upload debug symbols as artifact
        if: env.PACKAGE_SYMBOLS_NAME != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_SYMBOLS_NAME }}
          path: /tmp/${{ env.PACKAGE_SYMBOLS_NAME }}
          retention-days: 7

      - name: Upload checksums as artifacts
        if: inputs.checksum == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-checksums
          path: |
            /tmp/${{ env.PACKAGE_NAME }}.sha512
            /tmp/${{ env.PACKAGE_SYMBOLS_NAME }}.sha512
          retention-days: 7

