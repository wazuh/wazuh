run-name: Build Wazuh agent Linux - ${{ github.event.pull_request.head.ref || github.ref_name }} - ${{ inputs.system || 'deb,rpm' }} - ${{ inputs.architecture || 'amd64' }}
name: 5.X - Build Wazuh agent Linux (DEB/RPM)

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - "src/**"
      - "packages/**"
      - "ruleset/**"
      - ".github/actions/check_files/**"
      - ".github/workflows/5_builderpackage_agent-linux.yml"
      - ".github/workflows/5_testintegration_agent-start.yml"
      - ".github/workflows/5_testintegration_linux-integration-tests.yml"
      - ".github/test_modules_linux.json"
      - ".github/actions/5_builderpackage_get-last-stable-version/**"
      - ".github/actions/5_builderpackage_get-upgrade-test-package-url/**"
      - ".github/actions/5_builderpackage_linux-smoke-uninstall-test/**"
      - ".github/actions/5_builderpackage_linux-smoke-upgrade-test/**"
      - ".github/actions/5_testintegration_detect-changes/**"
  workflow_dispatch:
    inputs:
      architecture:
        type: choice
        description: Package architecture [x86_64, amd64].
        required: true
        default: amd64
        options:
          - x86_64
          - amd64
      system:
        type: choice
        description: Package OS [deb, rpm].
        required: true
        default: deb
        options:
          - deb
          - rpm
      revision:
        description: |
          Package revision (name and metadata).
          Default is '0'.
        required: false
        default: "0"
      debug:
        type: boolean
        description: |
          Build the binaries as debug (without optimizations).
          Default is 'false'.
        required: false
        default: false
      checksum:
        type: boolean
        description: |
          Generate package checksum.
          Default is 'false'.
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

