run-name: Build Wazuh agent Linux - ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }} - ${{ inputs.system || 'deb,rpm' }} - ${{ inputs.architecture || 'amd64,i386' }}
name: 5.X - Build Wazuh agent Linux (DEB/RPM)

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - "src/**"
      - "packages/**"
      - ".github/workflows/5_builderpackage_agent-linux.yml"
  workflow_dispatch:
    inputs:
      architecture:
        type: choice
        description: Package architecture [x86_64, amd64, i386].
        required: true
        default: amd64
        options:
          - x86_64
          - amd64
          - i386
      system:
        type: choice
        description: Package OS [deb, rpm].
        required: true
        default: deb
        options:
          - deb
          - rpm
      revision:
        description: |
          Package revision (name and metadata).
          Default is '0'.
        required: false
        default: '0'
      debug:
        type: boolean
        description: |
          Build the binaries as debug (without optimizations).
          Default is 'false'.
        required: false
        default: false
      checksum:
        type: boolean
        description: |
          Generate package checksum.
          Default is 'false'.
        required: false
        default: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        system: [deb, rpm]
        arch: ${{ github.event_name == 'pull_request' && fromJSON('["amd64", "i386"]') || fromJSON(format('["{{0}}"]', inputs.architecture == 'x86_64' && 'amd64' || inputs.architecture)) }}
    if: github.event_name == 'pull_request' || inputs.system == matrix.system
    runs-on: wz-linux-amd64
    timeout-minutes: 30
    name: Build ${{ matrix.system }} ${{ matrix.arch }} package
    env:
      ARCH: ${{ matrix.arch }}
      SYSTEM: ${{ matrix.system }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set VERSION and CONTAINER_NAME
        run: |
          VERSION="$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' VERSION.json)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$VERSION" >> $GITHUB_ENV
          echo "CONTAINER_NAME=pkg_${{ matrix.system }}_agent_builder_${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Download docker image for package building
        run: |
          bash .github/actions/ghcr-pull-and-push/pull_image_from_ghcr.sh ${{ secrets.CI_WAZUH_AGENT_PACKAGES_CLASSIC }} ${{ github.actor }} ${{ env.CONTAINER_NAME }} ${{ env.TAG }}

      - name: Append short commit to VERSION file
        run: |
          SHORT_COMMIT=$(git rev-parse --short=7 HEAD)
          if [ -z "$SHORT_COMMIT" ]; then echo "No commit found"; exit 1; fi
          echo "Found commit: $SHORT_COMMIT"
          sed -i '/"stage":/s/$/,/; /"stage":/a \    "commit": "'"$SHORT_COMMIT"'"' VERSION.json || exit 1
          cat VERSION.json

      - name: Build package
        run: |
          REVISION=${{ inputs.revision || '0' }}
          FLAGS="--verbose -t agent -s /tmp --dont-build-docker -j $(nproc) -r $REVISION "
          if [ "${{ inputs.checksum }}" == "true" ]; then FLAGS+="--checksum "; fi
          if [ "${{ inputs.debug }}" == "true" ]; then FLAGS+="--debug "; fi
          echo "generate_package.sh -a ${{ env.ARCH }} --tag ${{ env.TAG }} --system ${{ env.SYSTEM }} $FLAGS"
          bash packages/generate_package.sh -a ${{ env.ARCH }} --tag ${{ env.TAG }} --system ${{ env.SYSTEM }} $FLAGS

          if [ "${{ matrix.system }}" == "deb" ]; then
            DBG_PATTERN="^wazuh-agent-dbg"
            PKG_EXT=".deb"
          else
            DBG_PATTERN="^wazuh-agent-debuginfo"
            PKG_EXT=".rpm"
          fi

          PACKAGE_NAME=$(find /tmp -maxdepth 1 -type f -name "*agent*$PKG_EXT" -exec basename {} 2>/dev/null \; | grep -v -E "$DBG_PATTERN")
          PACKAGE_SYMBOLS_NAME=$(find /tmp -maxdepth 1 -type f -name "*agent*$PKG_EXT" -exec basename {} 2>/dev/null \; | grep -E "$DBG_PATTERN")

          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "PACKAGE_SYMBOLS_NAME=$PACKAGE_SYMBOLS_NAME" >> $GITHUB_ENV

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.system }}-${{ matrix.arch }}
          path: /tmp/${{ env.PACKAGE_NAME }}
          retention-days: 7

      - name: Upload debug symbols as artifact
        if: env.PACKAGE_SYMBOLS_NAME != ''
        uses: actions/upload-artifact@v4
        with:
          name: symbols-${{ matrix.system }}-${{ matrix.arch }}
          path: /tmp/${{ env.PACKAGE_SYMBOLS_NAME }}
          retention-days: 7

      - name: Upload checksums as artifacts
        if: inputs.checksum == true
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.system }}-${{ matrix.arch }}
          path: |
            /tmp/${{ env.PACKAGE_NAME }}.sha512
            /tmp/${{ env.PACKAGE_SYMBOLS_NAME }}.sha512
          retention-days: 7

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        system: [deb, rpm]
        arch: ${{ github.event_name == 'pull_request' && fromJSON('["amd64", "i386"]') || fromJSON(format('["{{0}}"]', inputs.architecture == 'x86_64' && 'amd64' || inputs.architecture)) }}
    if: github.event_name == 'pull_request' || inputs.system == matrix.system
    runs-on: wz-linux-amd64
    timeout-minutes: 30
    name: Test ${{ matrix.system }} ${{ matrix.arch }} package
    env:
      ARCH: ${{ matrix.arch }}
      SYSTEM: ${{ matrix.system }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set VERSION and CONTAINER_NAME
        run: |
          VERSION="$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' VERSION.json)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$VERSION" >> $GITHUB_ENV
          echo "CONTAINER_NAME=pkg_${{ matrix.system }}_agent_builder_${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: package-${{ matrix.system }}-${{ matrix.arch }}
          path: /tmp

      - name: Get Package Name
        run: |
          if [ "${{ matrix.system }}" == "deb" ]; then
            PKG_EXT=".deb"
          else
            PKG_EXT=".rpm"
          fi
          PACKAGE_NAME=$(find /tmp -maxdepth 1 -type f -name "*agent*$PKG_EXT" -exec basename {} 2>/dev/null \;)
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      - name: Download docker image for testing
        run: |
          bash .github/actions/ghcr-pull-and-push/pull_image_from_ghcr.sh ${{ secrets.CI_WAZUH_AGENT_PACKAGES_CLASSIC }} ${{ github.actor }} ${{ env.CONTAINER_NAME }} ${{ env.TAG }}

      - name: Test install package
        run: |
          TESTS_PATH=$GITHUB_WORKSPACE/.github/actions/test-install-components/
          if [ -z "${{ env.PACKAGE_NAME }}" ]; then
            echo "No package found!"
            exit 1
          fi
          sudo docker run \
            -v $TESTS_PATH/:/tests \
            -v /tmp/:/packages \
            -v /var/ossec:/var/ossec \
            -e ARCH="${{ env.ARCH }}" \
            -e SYSTEM="${{ env.SYSTEM }}" \
            --entrypoint '/tests/install_component.sh' \
            ${{ env.CONTAINER_NAME }}:${{ env.TAG }} \
            ${{ env.PACKAGE_NAME }} agent

          if grep -iq " installed.*wazuh-agent" /tmp/status.log ; then
            echo "Installation successfully."
          else
            echo "The installation could not be completed."
            exit 1
          fi
          echo "WAZUH_UID=$(cat $TESTS_PATH/wazuh_uid)" | tee -a $GITHUB_ENV
          echo "WAZUH_GID=$(cat $TESTS_PATH/wazuh_gid)" | tee -a $GITHUB_ENV

      - name: CSV filename Formation
        run: |
          echo "CSV_FILENAME=${{ matrix.system }}_linux_agent_${{ matrix.arch }}.csv" | tee -a $GITHUB_ENV

      - name: Check installed files
        uses: ./.github/actions/check_files
        with:
          expected_files: ${{ env.CSV_FILENAME }}
          installation_directory: /var/ossec
          wazuh_uid: ${{ env.WAZUH_UID }}
          wazuh_gid: ${{ env.WAZUH_GID }}

      - name: Test uninstall package
        uses: ./.github/actions/5_builderpackage_linux-smoke-uninstall-test
        with:
          tested_docker: "${{ env.CONTAINER_NAME }}:${{ env.TAG }}"

      - name: Get last stable version
        id: last-stable-version
        uses: ./.github/actions/5_builderpackage_get-last-stable-version
        with:
          repo_owner: wazuh
          repo_name: wazuh
          testing_version: ${{ env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get package url of the last stable version
        id: upgrade-package-url
        uses: ./.github/actions/5_builderpackage_get-upgrade-test-package-url
        with:
          component: agent
          os: linux
          system: ${{ env.SYSTEM }}
          version: ${{ steps.last-stable-version.outputs.latest_stable_version }}
          architecture: ${{ env.ARCH }}

      - name: Prepare package for upgrade test
        run: |
          mkdir -p /tmp/upgrade_test
          cp /tmp/${{ env.PACKAGE_NAME }} /tmp/upgrade_test/

      - name: Test upgrade from ${{ steps.last-stable-version.outputs.latest_stable_version }} to ${{ env.VERSION }}
        uses: ./.github/actions/5_builderpackage_linux-smoke-upgrade-test
        with:
          old_package_url: ${{ steps.upgrade-package-url.outputs.testing_package_url }}
          expected_upgrade_version: ${{ env.VERSION }}
          tested_docker: "${{ env.CONTAINER_NAME }}:${{ env.TAG }}"
          package_path: /tmp/upgrade_test

  upload-to-s3:
    needs: [build, test]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        system: [deb, rpm]
        arch: ${{ github.event_name == 'pull_request' && fromJSON('["amd64", "i386"]') || fromJSON(format('["{{0}}"]', inputs.architecture == 'x86_64' && 'amd64' || inputs.architecture)) }}
    runs-on: wz-linux-amd64
    timeout-minutes: 15
    name: Upload ${{ matrix.system }} ${{ matrix.arch }} to S3

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-${{ matrix.system }}-${{ matrix.arch }}
          path: /tmp

      - name: Download debug symbols artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: symbols-${{ matrix.system }}-${{ matrix.arch }}
          path: /tmp

      - name: Download checksums
        if: inputs.checksum == true
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: checksums-${{ matrix.system }}-${{ matrix.arch }}
          path: /tmp

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CI_INTERNAL_DEVELOPMENT_BUCKET_USER_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.CI_INTERNAL_DEVELOPMENT_BUCKET_USER_SECRET_KEY }}
          aws-region: ${{ secrets.CI_AWS_REGION }}

      - name: Upload to S3
        run: |
          S3_URI="s3://xdrsiem-packages-dev-internal/development/wazuh/5.x/main/packages"

          if [ "${{ matrix.system }}" == "deb" ]; then
            PKG_EXT=".deb"
          else
            PKG_EXT=".rpm"
          fi

          PACKAGE_FILE=$(find /tmp -maxdepth 1 -type f -name "*agent*$PKG_EXT" | grep -v "sha512" | head -n 1)
          if [ -z "$PACKAGE_FILE" ] || [ ! -s "$PACKAGE_FILE" ]; then
            echo "Package file is empty or does not exist."
            exit 1
          fi

          for file in /tmp/*agent*$PKG_EXT*; do
            if [ -s "$file" ]; then
              aws s3 cp "$file" "$S3_URI/"
            fi
          done

  smoke-test-linux:
    needs: [upload-to-s3]
    if: success()
    uses: ./.github/workflows/5_testintegration_agent-start.yml
    with:
      platform: 'linux'
    secrets: inherit
