name: 5.X - Package - Build multiple Wazuh Manager Packages

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - "api/**"
      - "framework/**"
      - "src/**"
      - ".github/workflows/5_builderpackage_manager-multiples.yml"
      - ".github/workflows/5_builderpackage_manager.yml"
      - "packages/*/SPECS/wazuh-manager/**"
      - "packages/*"
      - "packages/*/utils/*"
      - ".github/workflows/5_testintegration_manager.yml"
      - ".github/workflows/5_testintegration_inventory-sync.yml"
      - ".github/workflows/.python-version-it"
      - ".github/test_modules_manager.json"
      - ".github/actions/reinstall_cmake/**"
      - "tests/integration/conftest.py"
      - "tests/integration/test_api/**"
      - "tests/integration/test_wazuh_db/**"
      - "tests/integration/test_remoted/**"
      - "tests/integration/test_authd/**"
      # Agent-only trees, never built for the manager target (src/CMakeLists.txt gating)
      - "!src/rootcheck/**"
      - "!src/addagent/**"
      - "!src/os_execd/**"
      - "!src/win32/**"
      # Manager build forces USE_SELINUX=no (src/Makefile); only agent specs package it
      - "!src/selinux/**"
      # Test trees: UNIT_TEST/WAZUH_ENGINE_TEST-gated or excluded from the wheel (setup.py)
      - "!src/unit_tests/**"
      - "!src/**/tests/**"
      - "!src/**/integrationTests/**"
      # qa/ suites run in other workflows; inventory_sync/qa stays (its IT is
      # dispatched from here) and indexer_connector/** is detect-changes-mapped
      - "!src/data_provider/qa/**"
      - "!src/shared_modules/keystore/qa/**"
      - "!src/wazuh_modules/vulnerability_scanner/qa/**"
      - "!src/engine/test/**"
      - "!src/engine/docs/**"
      - "!framework/**/tests/**"
      - "!api/**/test/**"
      - "!api/test/**"
  workflow_dispatch:
    inputs:
      targets:
        description: 'Comma-separated targets. Example: "rpm-x86_64,deb-amd64".'
        type: string
        required: true
        default: 'rpm-x86_64,rpm-aarch64,deb-amd64,deb-arm64'
      revision:
        description: |
          Set the value to "1" for packages in release format.
          You can also add other values, such as issue numbers.
          By default, it is set to "0" for development.
        default: "0"
        type: string
        required: false
      is_stage:
          description: |
            Build package with release format.
            By default: false
          type: boolean
          required: false
      debug:
        description: |
          Build the binaries as debug (without optimizations).
          By default: false
        type: boolean
        required: false
      run_all:
        description: |
          Run all integration test modules.
          By default: true
        type: boolean
        default: true
        required: false
      base_branch:
        description: 'Base branch for qa-integration-framework resolution'
        type: string
        default: 'main'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  select-targets:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    name: Select build targets (Wazuh Managers)
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.result }}
    steps:
      - name: Generate dynamic matrix
        id: set-matrix
        uses: actions/github-script@v7
        with:
          script: |
            const targets = '${{ inputs.targets || 'rpm-x86_64,rpm-aarch64,deb-amd64,deb-arm64' }}'.split(',');
            const matrix = targets.map(target => {
              const [system, architecture] = target.split('-');
              return { system, architecture };
            });
            core.info('Generated matrix: ' + JSON.stringify(matrix));
            return { include: matrix };
          result-encoding: json

  detect-changes:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    name: Detect changed manager test modules
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      any_matched: ${{ steps.set-matrix.outputs.any_matched }}
      inventory_sync_changed: ${{ steps.set-matrix.outputs.inventory_sync_changed }}
      inventory_sync_timeout: ${{ steps.set-matrix.outputs.inventory_sync_timeout }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build matrix from changed files
        id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_ALL: ${{ inputs.run_all }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        shell: python
        run: |
          import json, os, re, subprocess

          def github_glob_to_regex(pattern):
              parts = pattern.split("**")
              return ".*".join(
                  re.escape(p).replace(r"\*", "[^/]*").replace(r"\?", "[^/]")
                  for p in parts
              )

          event_name = os.environ.get("EVENT_NAME", "").strip()
          run_all    = os.environ.get("RUN_ALL",    "true").strip().lower() == "true"
          base_sha   = os.environ.get("BASE_SHA",   "").strip()
          head_sha   = os.environ.get("HEAD_SHA",   "").strip()

          # GitHub Actions rejects an empty matrix, so use a sentinel entry.
          # Downstream jobs are gated on any_matched == "true", so this entry is skipped (never runs).
          none_matrix = {"include": [{
              "name": "none", "suite_type": "none",
              "pytest_target": "", "pytest_extra_args": "",
              "pytest_tier_args": "",
              "timeout_minutes": 1,
          }]}

          with open(".github/test_modules_manager.json") as f:
              config = json.load(f)

          def build_entry(mod, tier):
              tier_args = " ".join(f"--tier {t}" for t in tier.split())
              return {
                  "name":              mod["name"],
                  "suite_type":        mod["suite_type"],
                  "pytest_target":     mod.get("pytest_target", ""),
                  "pytest_extra_args": mod.get("pytest_extra_args", ""),
                  "pytest_tier_args":  tier_args,
                  "timeout_minutes":   mod.get("timeout_minutes", 120),
              }

          inv_mod = next((m for m in config["modules"] if m["suite_type"] == "inventory_sync"), {})
          inv_timeout = inv_mod.get("timeout_minutes", 60)

          # Manual dispatch without run_all has no PR SHAs, so resolve them by diffing the
          # dispatched branch against its base branch. If it can't be resolved, the SHAs stay
          # empty and the logic below falls back to running everything.
          if event_name == "workflow_dispatch" and not run_all and not (base_sha and head_sha):
              base_branch = os.environ.get("BASE_BRANCH", "main").strip() or "main"
              subprocess.run(["git", "fetch", "--quiet", "origin", base_branch], check=False)
              base_sha = subprocess.run(
                  ["git", "merge-base", "FETCH_HEAD", "HEAD"],
                  capture_output=True, text=True,
              ).stdout.strip()
              head_sha = "HEAD" if base_sha else ""

          if event_name == "workflow_dispatch" and run_all:
              matrix_entries = []
              inventory_sync_matched = True
              for mod in config["modules"]:
                  if mod["suite_type"] == "inventory_sync":
                      continue
                  for tier in mod.get("tiers", ["0 1"]):
                      matrix_entries.append(build_entry(mod, tier))
          elif base_sha and head_sha:
              result = subprocess.run(
                  ["git", "diff", "--name-only", base_sha, head_sha],
                  capture_output=True, text=True, check=True,
              )
              changed = set(result.stdout.splitlines())
              matrix_entries = []
              inventory_sync_matched = False
              for mod in config["modules"]:
                  regexes = [github_glob_to_regex(p) for p in mod["paths"]]
                  if not any(any(re.fullmatch(rx, fp) for rx in regexes) for fp in changed):
                      continue
                  if mod["suite_type"] == "inventory_sync":
                      inventory_sync_matched = True
                  else:
                      for tier in mod.get("tiers", ["0 1"]):
                          matrix_entries.append(build_entry(mod, tier))
          else:
              # Fallback: no diff base could be resolved — run everything to stay safe.
              print("::warning::Could not resolve a diff base — running all modules.")
              matrix_entries = []
              inventory_sync_matched = True
              for mod in config["modules"]:
                  if mod["suite_type"] == "inventory_sync":
                      continue
                  for tier in mod.get("tiers", ["0 1"]):
                      matrix_entries.append(build_entry(mod, tier))

          matrix      = {"include": matrix_entries} if matrix_entries else none_matrix
          any_matched = "true" if matrix_entries else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"any_matched={any_matched}\n")
              f.write(f"inventory_sync_changed={'true' if inventory_sync_matched else 'false'}\n")
              f.write(f"inventory_sync_timeout={inv_timeout}\n")

  build-wazuh-manager:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    name: Build Wazuh Manager
    needs: select-targets
    permissions:
        contents: read
        packages: write
    strategy:
        matrix: ${{ fromJSON(needs.select-targets.outputs.matrix) }}
        fail-fast: false
    uses: ./.github/workflows/5_builderpackage_manager.yml
    with:
      docker_image_tag: auto
      architecture:  ${{ matrix.architecture }}
      system:  ${{ matrix.system }}
      revision: ${{ inputs.revision || '0' }}
      is_stage: "${{ inputs.is_stage || false }}"
      debug: "${{ inputs.debug || false }}"
    secrets: inherit

  run-integration-tests:
    if: >
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.detect-changes.outputs.any_matched == 'true' &&
      needs.build-wazuh-manager.result == 'success'
    name: ${{ matrix.name == 'none' && 'Integration tests - No relevant changes' || format('Integration tests - {0}', matrix.name) }}
    needs: [build-wazuh-manager, detect-changes]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    uses: ./.github/workflows/5_testintegration_manager.yml
    with:
      build_run_id: ${{ github.run_id }}
      module_name: ${{ matrix.name }}
      pytest_target: ${{ matrix.pytest_target }}
      pytest_extra_args: ${{ matrix.pytest_extra_args }}
      pytest_tier_args: ${{ matrix.pytest_tier_args }}
      timeout_minutes: ${{ matrix.timeout_minutes }}
      base_branch: ${{ github.event.pull_request.base.ref || inputs.base_branch || 'main' }}
    secrets: inherit

  run-inventory-sync:
    if: >
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.detect-changes.outputs.inventory_sync_changed == 'true' &&
      needs.build-wazuh-manager.result == 'success'
    name: ${{ needs.detect-changes.outputs.inventory_sync_changed == 'true' && 'Integration tests - inventory_sync' || 'Integration tests - inventory_sync - No relevant changes' }}
    needs: [build-wazuh-manager, detect-changes]
    uses: ./.github/workflows/5_testintegration_inventory-sync.yml
    with:
      build_run_id: ${{ github.run_id }}
      timeout_minutes: ${{ fromJSON(needs.detect-changes.outputs.inventory_sync_timeout) }}
      base_branch: ${{ github.event.pull_request.base.ref || inputs.base_branch || 'main' }}
    secrets: inherit
