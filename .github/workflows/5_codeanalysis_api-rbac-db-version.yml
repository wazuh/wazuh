name: 5.X - API RBAC DB Version Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/5_codeanalysis_api-rbac-db-version.yml"
      - "framework/wazuh/rbac/default/**"
      - "framework/wazuh/rbac/orm.py"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check version skip
        id: check_skip
        run: |
          VERSION=$(jq -r '.version' VERSION.json)
          [[ "$VERSION" =~ \.0\.0$ ]] && SKIP="true" || SKIP="false"
          echo "skip=$SKIP" >> $GITHUB_OUTPUT

      - name: Detect file changes
        if: steps.check_skip.outputs.skip != 'true'
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rbac_defaults:
              - 'framework/wazuh/rbac/default/**'
            orm_handler:
              - 'framework/wazuh/rbac/orm.py'

      - name: Validate RBAC DB version bump
        if: steps.check_skip.outputs.skip != 'true' && steps.filter.outputs.rbac_defaults == 'true'
        run: |
          set -euo pipefail

          if [ "${{ steps.filter.outputs.orm_handler }}" != "true" ]; then
            echo "::error::RBAC default files were modified but orm.py was not changed."
            exit 1
          fi

          if ! git diff "origin/${{ github.base_ref }}" HEAD -- framework/wazuh/rbac/orm.py | grep -q 'CURRENT_ORM_VERSION'; then
            echo "::error::CURRENT_ORM_VERSION was not bumped in orm.py."
            exit 1
          fi

