name: 4.X - Package - Retag Docker images
on:
  workflow_dispatch:
    inputs:
      old_version:
        description: |
          Tag name refering old tag
          (Use a version name. Ex 4.8.0)
        required: false
        default: none
      new_version:
        description: |
          Retagging tag
          (Use a version name. Ex 4.8.0
          Must be newer than old one.)
        required: false
        default: none
      single_docker_image:
        description: |
          Docker image name. Used to retag only
          the provided image.
        required: false
        default: ""
  push:
    branches:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "main"
    paths:
      - "VERSION.json"
      - "src/VERSION"

jobs:
  deprecated:
    runs-on: ubuntu-latest
    steps:
      - name: Warning
        run: echo "This workflow is deprecated. Be careful, you have just run it from main."
