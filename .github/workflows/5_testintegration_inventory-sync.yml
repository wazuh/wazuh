name: 5.X - Inventory Sync - Integration tests
run-name: "IT Inventory Sync - ${{ github.ref_name }}"

on:
  workflow_call:
    inputs:
      build_run_id:
        required: false
        type: string
        default: ''
      timeout_minutes:
        required: false
        type: number
        default: 60
      base_branch:
        required: false
        type: string
        default: 'main'
  workflow_dispatch:
    inputs:
      build_run_id:
        required: false
        default: ''
      timeout_minutes:
        description: 'Job timeout in minutes'
        required: false
        default: '60'
      base_branch:
        description: 'Base branch'
        required: false
        default: 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-test:
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes || '60') }}
    name: Run inventory sync integration tests
    runs-on: ubuntu-24.04
    env:
      INSTALLATION_DIR: /var/wazuh-manager
    services:
      opensearch:
        image: opensearchproject/opensearch:latest
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
          action.auto_create_index: "true"
          cluster.routing.allocation.disk.threshold_enabled: "false"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Path A: use pre-built artifact ────────────────────────────────────

      - name: Download manager package artifact
        if: inputs.build_run_id != ''
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          workflow: 5_builderpackage_manager-multiples.yml
          run_id: ${{ inputs.build_run_id }}
          workflow_conclusion: success
          name_is_regexp: true
          name: wazuh-manager.*amd64.*\.deb
          path: /tmp/packages
          if_no_artifact_found: fail
          check_artifacts: true
          search_artifacts: true

      - name: Install wazuh-manager from artifact
        if: inputs.build_run_id != ''
        run: |
          PACKAGE_PATH=$(find /tmp/packages -maxdepth 2 -type f -name "wazuh-manager*amd64*.deb" \
            | grep -v "wazuh-manager-dbg" | head -n 1)
          if [ -z "$PACKAGE_PATH" ]; then
            echo "No manager package found in /tmp/packages"
            exit 1
          fi
          sudo dpkg -i "${PACKAGE_PATH}" || sudo apt-get install -f -y
          if ! dpkg -l wazuh-manager | grep -q '^ii'; then
            echo "wazuh-manager package installation failed"
            exit 1
          fi

      # ── Path B: build from source ─────────────────────────────────────────

      - name: Free disk space
        if: inputs.build_run_id == ''
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Initialize submodules
        if: inputs.build_run_id == ''
        run: git submodule update --init --recursive

      - name: Install compatible CMake
        if: inputs.build_run_id == ''
        uses: ./.github/actions/reinstall_cmake

      - name: Build wazuh-manager
        if: inputs.build_run_id == ''
        run: |
          make deps -C src TARGET=manager -j$(nproc)
          make -C src TARGET=manager -j$(nproc)

      - name: Install wazuh-manager from source
        if: inputs.build_run_id == ''
        run: |
          cat > ./etc/preloaded-vars.conf << 'EOF'
          USER_LANGUAGE="en"
          USER_INSTALL_TYPE="manager"
          USER_DIR="/var/wazuh-manager"
          USER_ENABLE_AUTHD="y"
          USER_AUTO_START="n"
          EOF
          sudo sh install.sh
          rm ./etc/preloaded-vars.conf

      # ── Common steps ──────────────────────────────────────────────────────

      - name: Configure indexer connector and start manager
        run: |
          CONF="$INSTALLATION_DIR/etc/wazuh-manager.conf"
          sudo systemctl stop wazuh-manager 2>/dev/null || true
          sudo sed -i 's|https://127\.0\.0\.1:9200|http://127.0.0.1:9200|g' "${CONF}"
          sudo mkdir -p "$INSTALLATION_DIR/etc/certs"
          sudo touch "$INSTALLATION_DIR/etc/certs/root-ca.pem"
          sudo sed -i '/manager\.pem/d' "${CONF}"
          sudo sed -i '/manager-key\.pem/d' "${CONF}"
          sudo sed -i 's|<ca>etc|<ca>/var/wazuh-manager/etc|' "${CONF}"
          sudo systemctl start wazuh-manager
          sleep 10
          if ! systemctl is-active --quiet wazuh-manager; then
            sudo systemctl status wazuh-manager --no-pager
            exit 1
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-venv flatbuffers-compiler

      - name: Set up Python test environment
        working-directory: src/wazuh_modules/inventory_sync/qa
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate FlatBuffers classes
        working-directory: src/wazuh_modules/inventory_sync/qa
        run: |
          source venv/bin/activate
          python3 generate_flatbuffers.py
          if [ ! -d "generated" ]; then
            echo "FlatBuffers generation failed"
            exit 1
          fi

      - name: Run inventory_sync integration tests
        working-directory: src/wazuh_modules/inventory_sync/qa
        env:
          TEST_MANAGER: '127.0.0.1'
        run: |
          source venv/bin/activate
          python3 run_tests.py --manager "$TEST_MANAGER" --verbose

      - name: Cleanup and collect logs
        if: always()
        run: |
          if systemctl is-active --quiet wazuh-manager 2>/dev/null; then
            sudo systemctl stop wazuh-manager
          fi
          if sudo test -f "$INSTALLATION_DIR/logs/wazuh-manager.log"; then
            sudo tail -50 "$INSTALLATION_DIR/logs/wazuh-manager.log"
            sudo cp "$INSTALLATION_DIR/logs/wazuh-manager.log" ./wazuh-manager.log
            sudo chown "$(id -un):$(id -gn)" ./wazuh-manager.log
          else
            echo "wazuh-manager.log not found at $INSTALLATION_DIR/logs/ — searching:"
            sudo find /var/log -name "*wazuh*" -o -name "*ossec*" 2>/dev/null | head -10 || true
            for log_path in "/var/log/wazuh" "/var/log/ossec" "/opt/wazuh/logs"; do
              [ -d "$log_path" ] && ls -la "$log_path/" || true
            done
            sudo journalctl -u wazuh-manager --no-pager -n 50 2>/dev/null || true
          fi

      - name: Upload inventory_sync test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inventory-sync-test-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            src/wazuh_modules/inventory_sync/qa/generated/
            src/wazuh_modules/inventory_sync/qa/wazuh_agents.json
          retention-days: 7
          if-no-files-found: warn
