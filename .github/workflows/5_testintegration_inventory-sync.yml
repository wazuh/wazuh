run-name: Inventory Sync Integration Tests - ${{ github.event.pull_request.number || github.sha }}
name: 5.X - Inventory Sync - Integration tests

on:
  workflow_dispatch:
    inputs:
      test_manager:
        description: "Manager IP for testing (default: 127.0.0.1)"
        type: string
        default: "127.0.0.1"
        required: false
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - 'src/wazuh_modules/inventory_sync/**'
      - 'src/shared_modules/utils/flatbuffers/**'
      - '.github/workflows/5_testintegration_inventory-sync.yml'
      - 'src/shared_modules/indexer_connector/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inventory-sync-integration-tests:
    runs-on: wz-linux-amd64

    services:
      opensearch:
        image: opensearchproject/opensearch:latest
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: true
          action.auto_create_index: "true"
          cluster.routing.allocation.disk.threshold_enabled: "false"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space (safe cleanup)
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true

      - name: Wait for deb amd64 check to be created
        if: github.event_name == 'pull_request'
        id: wait-for-specific-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAX_ATTEMPTS=10
          ATTEMPT=0
          CHECK_NAME="Build Wazuh Manager (deb, amd64) / Build deb wazuh-manager on amd64"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            CHECK_EXISTS=$(gh api repos/wazuh/wazuh/commits/${{ github.event.pull_request.head.sha }}/check-runs --jq ".check_runs[] | select(.name == \"$CHECK_NAME\") | .name" | head -1)

            if [ -n "$CHECK_EXISTS" ] && [ "$CHECK_EXISTS" != "null" ]; then
              echo "check-created=true" >> $GITHUB_OUTPUT
              break
            fi
            sleep 30
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "check-created=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Wait for deb amd64 Package Build to complete
        if: github.event_name == 'pull_request' && steps.wait-for-specific-check.outputs.check-created == 'true'
        id: wait-for-check-completion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAX_ATTEMPTS=60
          ATTEMPT=0
          CHECK_NAME="Build Wazuh Manager (deb, amd64) / Build deb wazuh-manager on amd64"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            CHECK_STATUS=$(gh api repos/wazuh/wazuh/commits/${{ github.event.pull_request.head.sha }}/check-runs --jq ".check_runs[] | select(.name == \"$CHECK_NAME\") | .conclusion" | head -1)

            if [ "$CHECK_STATUS" = "success" ]; then
              echo "check-completed=true" >> $GITHUB_OUTPUT
              break
            elif [ "$CHECK_STATUS" = "failure" ] || [ "$CHECK_STATUS" = "cancelled" ]; then
              echo "check-completed=false" >> $GITHUB_OUTPUT
              exit 1
            fi
            sleep 30
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "check-completed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update || exit 1
          sudo apt-get install -y python3 python3-pip python3-venv flatbuffers-compiler curl wget || exit 1

          if ! command -v gh &> /dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update || exit 1
            sudo apt-get install -y gh || exit 1
          fi

      - name: Get Package Build Run ID and Artifact
        if: github.event_name == 'pull_request' && steps.wait-for-check-completion.outputs.check-completed == 'true'
        id: get-run-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list -L 200 --commit="${{ github.event.pull_request.head.sha }}" --json databaseId,workflowName --jq '.[] | select(.workflowName | test("Package - Build multiple Wazuh Manager Packages")) | .databaseId' | head -1)
          [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ] || exit 1

          ARTIFACT_NAME=$(gh api repos/wazuh/wazuh/actions/runs/$RUN_ID/artifacts --jq '.artifacts[] | select(.name | contains("amd64") and contains("wazuh-manager") and endswith(".deb")) | .name' | head -1)
          [ -n "$ARTIFACT_NAME" ] || exit 1

          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "artifact-name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Download Wazuh manager package
        if: github.event_name == 'pull_request' && steps.wait-for-check-completion.outputs.check-completed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.get-run-info.outputs.artifact-name }}
          path: ./packages/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get-run-info.outputs.run-id }}

      - name: Install Wazuh manager package
        if: github.event_name == 'pull_request' && steps.wait-for-check-completion.outputs.check-completed == 'true'
        run: |
          PACKAGE_FILE=$(find ./packages -name "*amd64*.deb" | head -1)
          [ -n "$PACKAGE_FILE" ] || exit 1

          sudo dpkg -i "$PACKAGE_FILE" || sudo apt-get -f install -y || exit 1
          sudo sed -i 's/https:\/\/127\.0\.0\.1:9200/http:\/\/127.0.0.1:9200/g' /var/wazuh-manager/etc/wazuh-manager.conf || exit 1

          sudo mkdir -p /var/wazuh-manager/etc/certs || exit 1
          sudo touch /var/wazuh-manager/etc/certs/root-ca.pem /var/wazuh-manager/etc/certs/manager.pem /var/wazuh-manager/etc/certs/manager-key.pem || exit 1

          sudo systemctl start wazuh-manager || exit 1
          sleep 10
          systemctl is-active --quiet wazuh-manager || exit 1

      - name: Setup Python environment
        working-directory: src/wazuh_modules/inventory_sync/qa
        run: |
          python3 -m venv venv || exit 1
          ./venv/bin/pip install --upgrade pip || exit 1
          ./venv/bin/pip install -r requirements.txt || exit 1

      - name: Generate FlatBuffers classes
        working-directory: src/wazuh_modules/inventory_sync/qa
        run: |
          ./venv/bin/python generate_flatbuffers.py || exit 1
          [ -d "generated" ] || exit 1

      - name: Run inventory sync integration tests
        working-directory: src/wazuh_modules/inventory_sync/qa
        run: |
          TEST_MANAGER="${{ github.event.inputs.test_manager || '127.0.0.1' }}"
          ./venv/bin/python run_tests.py --manager "$TEST_MANAGER" --verbose || exit 1

      - name: Cleanup and collect logs
        if: always()
        run: |
          if systemctl is-active --quiet wazuh-manager 2>/dev/null; then
            sudo systemctl stop wazuh-manager
          fi

          if [ -f /var/wazuh-manager/logs/wazuh-manager.log ]; then
            sudo cp /var/wazuh-manager/logs/wazuh-manager.log ./wazuh-manager.log
            sudo chown $USER:$USER ./wazuh-manager.log
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inventory-sync-test-results
          path: |
            src/wazuh_modules/inventory_sync/qa/generated/
            src/wazuh_modules/inventory_sync/qa/wazuh_agents.json
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Wazuh logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wazuh-logs
          path: wazuh-manager.log
          retention-days: 7
          if-no-files-found: warn
