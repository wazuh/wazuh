name: 5.X - Package - Build internal tools package

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - "src/engine/test/**"
      - "src/engine/tools/**"
      - "src/engine/internal_packages/**"
      - ".github/workflows/5_buildpackage_internal_tools.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"
      checksum:
        description: "Attach checksum (.sha512)"
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  PKG_TARGET_DIR: src/engine/internal_packages
  SCRIPT: generate_package.sh
  REVISION: "1"
  TAG_NAME: "local"
  GEN_CHECKSUM: ${{ github.event_name == 'pull_request' && 'true' || (github.event_name == 'workflow_dispatch' && inputs.checksum || 'false') }}
  OUTDIR: /tmp

jobs:
  build:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    name: Build ${{ matrix.system }} / ${{ matrix.arch }}
    runs-on: ${{ (matrix.arch == 'arm64' || matrix.arch == 'aarch64') && format('codebuild-github-actions-codebuild-runner-server-arm-{0}-{1}', github.run_id, github.run_attempt) || format('codebuild-github-actions-codebuild-runner-server-amd-{0}-{1}', github.run_id, github.run_attempt) }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        system: [deb, rpm]
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || '' }}

      - name: CodeBuild workarounds
        # TODO: Remove once DevOps exposes host Docker socket or configures DinD in CodeBuild
        run: |
          # 1. Docker daemon: CodeBuild has no systemd so dockerd never starts.
          #    VFS storage driver avoids overlay-on-overlay which is not supported inside containers.
          if ! docker info &>/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
            sudo nohup dockerd --storage-driver vfs > /var/log/dockerd.log 2>&1 &
            timeout 60 bash -c 'until docker info &>/dev/null 2>&1; do sleep 1; done'
            sudo chmod 666 /var/run/docker.sock
          fi
          # 2. Git repo format: actions/checkout on newer git writes repositoryformatversion=1
          #    which the older git inside builder Docker images cannot read.
          git config core.repositoryformatversion 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.CI_WAZUHCI_DOCKERHUB_USER }} 
          password: ${{ secrets.CI_WAZUHCI_DOCKERHUB_TOKEN }}

      - name: Build package
        working-directory: ${{ env.PKG_TARGET_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          ARGS=( "--system" "${{ matrix.system }}" "-a" "${{ matrix.arch }}" "-s" "${{ env.OUTDIR }}" "-r" "${{ env.REVISION }}" "-j" "$(nproc)" "--tag" "${{ env.TAG_NAME }}" "--verbose" )
          if [ "${{ env.GEN_CHECKSUM }}" == "true" ]; then ARGS+=( "--checksum" ); fi
          ./${{ env.SCRIPT }} "${ARGS[@]}"

      - name: Process and rename artifact
        shell: bash
        run: |
          set -euo pipefail
          COMMIT="${GITHUB_SHA::7}"

          if [ "${{ matrix.system }}" == "deb" ]; then
            PKG=$(ls ${{ env.OUTDIR }}/wazuh-internal-tools_*_${{ matrix.arch }}.deb | head -n 1)
            BASE=$(basename "$PKG" .deb)
            NEW_PKG="${BASE}_${COMMIT}.deb"
          else
            if [ "${{ matrix.arch }}" == "amd64" ]; then ARCH_PAT="x86_64"; else ARCH_PAT="aarch64"; fi
            PKG=$(ls ${{ env.OUTDIR }}/wazuh-internal-tools_*_${ARCH_PAT}.rpm | head -n 1)
            BASE=$(basename "$PKG" .rpm)
            NEW_PKG="${BASE}_${COMMIT}.rpm"
          fi

          if [ -z "$PKG" ]; then exit 1; fi

          sudo mv "$PKG" "${{ env.OUTDIR }}/$NEW_PKG"

          cat << EOF | sed -e 's/^[[:space:]]*//' -e 's/\r$//' >> $GITHUB_ENV
          PKG_NAME=$NEW_PKG
          EOF

          if [ "${{ env.GEN_CHECKSUM }}" == "true" ]; then
            sha512sum "${{ env.OUTDIR }}/$NEW_PKG" > "${{ env.OUTDIR }}/${NEW_PKG}.sha512"
          fi

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}
          path: ${{ env.OUTDIR }}/${{ env.PKG_NAME }}
          if-no-files-found: error
          overwrite: true

      - name: Upload checksum
        if: env.GEN_CHECKSUM == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}.sha512
          path: ${{ env.OUTDIR }}/${{ env.PKG_NAME }}.sha512
          if-no-files-found: error
          overwrite: true

      - name: Test package installation and execution
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.system }}" == "rpm" ]; then
            if [ "${{ matrix.arch }}" == "amd64" ]; then PLATFORM="linux/amd64"; else PLATFORM="linux/arm64"; fi
            docker run --rm --platform "${PLATFORM}" \
              -v "${{ env.OUTDIR }}/${{ env.PKG_NAME }}:/tmp/package.rpm:ro" \
              -v "${{ github.workspace }}/${{ env.PKG_TARGET_DIR }}/test_package.sh:/host/test_package.sh:ro" \
              rockylinux:9 bash -c "
                set -euo pipefail
                yum install -y /tmp/package.rpm > /dev/null
                cp /host/test_package.sh /tmp/test_package.sh
                chmod +x /tmp/test_package.sh
                /tmp/test_package.sh
              "
          else
            sudo dpkg -i "${{ env.OUTDIR }}/${{ env.PKG_NAME }}" || sudo apt-get install -f -y
            cd ${{ env.PKG_TARGET_DIR }}
            chmod +x ./test_package.sh
            ./test_package.sh
            sudo dpkg -r wazuh-internal-tools || true
          fi
