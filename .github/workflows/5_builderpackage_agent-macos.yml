run-name: Build Wazuh agent macOS - ${{ github.event.pull_request.head.ref || github.ref_name }} - ${{ inputs.architecture || 'intel64,arm64' }}
name: 5.X - Build Wazuh agent macOS (PKG)

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - "src/**"
      - "packages/**"
      - ".github/workflows/5_builderpackage_agent-macos.yml"
  workflow_dispatch:
    inputs:
      architecture:
        type: choice
        description: Package architecture [intel64, arm64].
        required: true
        default: intel64
        options:
          - intel64
          - arm64
      revision:
        description: |
          Package revision (name and metadata).
          Default is '1'.
        required: false
        default: "1"
      debug:
        type: boolean
        description: |
          Build the binaries as debug (without optimizations).
          Default is 'false'.
        required: false
        default: false
      checksum:
        type: boolean
        description: |
          Generate package checksum.
          Default is 'false'.
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build-package:
    if: github.event_name == 'pull_request' || inputs.architecture == matrix.arch
    runs-on: ${{ matrix.arch == 'intel64' && 'macos-14-large' || 'macos-14' }}
    timeout-minutes: 90
    name: Build PKG package (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: [intel64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set VERSION and ARCH
        run: |
          VERSION="$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' VERSION.json)"
          cat << EOF >> $GITHUB_ENV
          VERSION=$VERSION
          ARCH=${{ matrix.arch }}
          EOF

      - name: Append short commit to VERSION file
        run: |
          SHORT_COMMIT=$(git rev-parse --short=7 HEAD)
          if [ -z "$SHORT_COMMIT" ]; then exit 1; fi
          sed -i '' '/"stage":/s/$/,/; /}/{i\
              "commit": "'"$SHORT_COMMIT"'"'$'\n''}' VERSION.json || exit 1

      - name: Install dependencies
        run: |
          bash packages/macos/generate_wazuh_packages.sh -i

      - name: Build macOS package
        id: build
        run: |
          REVISION=${{ inputs.revision || '1' }}
          FLAGS="-a ${{ env.ARCH }} -j 2 -r $REVISION --verbose "
          if [ "${{ inputs.checksum }}" == "true" ]; then FLAGS+="--checksum "; fi
          if [ "${{ inputs.debug }}" == "true" ]; then FLAGS+="--debug "; fi
          sudo bash packages/macos/generate_wazuh_packages.sh $FLAGS

          PACKAGE_NAME=$(find packages/macos/output -maxdepth 1 -type f -name "*agent*.pkg" -exec basename {} 2>/dev/null \;)
          PACKAGE_SYMBOLS_NAME=$(find packages/macos/output -maxdepth 1 -type f -name "*agent-debug-symbols*.zip" -exec basename {} 2>/dev/null \;)

          cat << EOF > packages/macos/output/metadata.env
          PACKAGE_NAME=$PACKAGE_NAME
          PACKAGE_SYMBOLS_NAME=$PACKAGE_SYMBOLS_NAME
          VERSION=${{ env.VERSION }}
          ARCH=${{ env.ARCH }}
          EOF

          cat << EOF >> $GITHUB_ENV
          PACKAGE_NAME=$PACKAGE_NAME
          PACKAGE_SYMBOLS_NAME=$PACKAGE_SYMBOLS_NAME
          EOF

      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: metadata-${{ matrix.arch }}
          path: packages/macos/output/metadata.env
          retention-days: 1

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: packages/macos/output/${{ env.PACKAGE_NAME }}
          retention-days: 7

      - name: Upload debug symbols as artifact
        if: env.PACKAGE_SYMBOLS_NAME != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_SYMBOLS_NAME }}
          path: packages/macos/output/${{ env.PACKAGE_SYMBOLS_NAME }}
          retention-days: 7

      - name: Upload checksums as artifacts
        if: inputs.checksum == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-checksums
          path: |
            packages/macos/output/${{ env.PACKAGE_NAME }}.sha512
            packages/macos/output/${{ env.PACKAGE_SYMBOLS_NAME }}.sha512
          retention-days: 7

  test-package:
    needs: build-package
    if: github.event_name == 'pull_request' || inputs.architecture == matrix.arch
    runs-on: ${{ matrix.arch == 'intel64' && 'macos-14-large' || 'macos-14' }}
    timeout-minutes: 30
    name: Test PKG package (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: [intel64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download metadata
        uses: actions/download-artifact@v4
        with:
          name: metadata-${{ matrix.arch }}
          path: packages/macos/output

      - name: Load metadata
        run: |
          cat packages/macos/output/metadata.env >> $GITHUB_ENV

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: packages/macos/output

      - name: Test install macOS package
        run: |
          sudo installer -pkg packages/macos/output/${{ env.PACKAGE_NAME }} -target / | sudo tee installer.log
          if ! grep -q "The install was successful" "installer.log"; then exit 1; fi

      - name: Checking files after installation
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install -r .github/actions/check_files/requirements.txt
          sudo /Library/Ossec/bin/wazuh-control stop
          sudo python3 .github/actions/check_files/check_files.py -f ".github/actions/check_files/macos_agent_$(uname -m).csv" --wazuh_gid -1 --wazuh_uid -1 --directory '/Library/Ossec'
          sudo python3 .github/actions/check_files/check_files.py -b 'macos_actual_state.csv' --wazuh_gid -1 --wazuh_uid -1 --directory '/Library/Ossec'

      - name: Uninstall package
        run: |
          sudo /bin/rm -r /Library/Ossec
          sudo /bin/rm -f /Library/LaunchDaemons/com.wazuh.agent.plist
          sudo /bin/rm -rf /Library/StartupItems/WAZUH
          sudo /usr/bin/dscl . -delete "/Users/wazuh"
          sudo /usr/bin/dscl . -delete "/Groups/wazuh"
          sudo /usr/sbin/pkgutil --forget com.wazuh.pkg.wazuh-agent

      - name: Get last stable version
        id: last-stable-version
        uses: ./.github/actions/5_builderpackage_get-last-stable-version
        with:
          repo_owner: wazuh
          repo_name: wazuh
          testing_version: ${{ env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get package url of the last stable version
        id: upgrade-package-url
        uses: ./.github/actions/5_builderpackage_get-upgrade-test-package-url
        with:
          component: agent
          os: macos
          version: ${{ steps.last-stable-version.outputs.latest_stable_version }}
          architecture: ${{ env.ARCH }}

      - name: Test uninstall and upgrade
        uses: ./.github/actions/5_builderpackage_macos-smoke-upgrade-test
        with:
          old_package_url: ${{ steps.upgrade-package-url.outputs.testing_package_url }}
          expected_upgrade_version: ${{ env.VERSION }}

  upload-to-s3:
    needs: [build-package, test-package]
    if: success() && (github.event_name == 'pull_request' || inputs.architecture == matrix.arch)
    runs-on: wz-linux-amd64
    timeout-minutes: 15
    name: Upload PKG to S3 (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: [intel64, arm64]

    steps:
      - name: Download metadata
        uses: actions/download-artifact@v4
        with:
          name: metadata-${{ matrix.arch }}
          path: /tmp

      - name: Load metadata
        run: |
          cat /tmp/metadata.env >> $GITHUB_ENV

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: /tmp

      - name: Download debug symbols artifacts
        if: env.PACKAGE_SYMBOLS_NAME != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_SYMBOLS_NAME }}
          path: /tmp

      - name: Download checksums
        if: inputs.checksum == true
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-checksums
          path: /tmp

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CI_INTERNAL_DEVELOPMENT_BUCKET_USER_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.CI_INTERNAL_DEVELOPMENT_BUCKET_USER_SECRET_KEY }}
          aws-region: ${{ secrets.CI_AWS_REGION }}

      - name: Upload package to S3
        run: |
          S3_URI="s3://xdrsiem-packages-dev-internal/development/wazuh/5.x/main/packages"
          if [ -s "/tmp/${{ env.PACKAGE_NAME }}" ]; then
            aws s3 cp /tmp/${{ env.PACKAGE_NAME }} $S3_URI/
          else
            exit 1
          fi

      - name: Upload checksum to S3
        if: inputs.checksum == true
        run: |
          S3_URI="s3://xdrsiem-packages-dev-internal/development/wazuh/5.x/main/packages"
          if [ -s "/tmp/${{ env.PACKAGE_NAME }}.sha512" ]; then
            aws s3 cp /tmp/${{ env.PACKAGE_NAME }}.sha512 $S3_URI/
          fi

      - name: Upload debug symbols to S3
        if: env.PACKAGE_SYMBOLS_NAME != ''
        run: |
          S3_URI="s3://xdrsiem-packages-dev-internal/development/wazuh/5.x/main/packages"
          if [ -s "/tmp/${{ env.PACKAGE_SYMBOLS_NAME }}" ]; then
            aws s3 cp /tmp/${{ env.PACKAGE_SYMBOLS_NAME }} $S3_URI/
          fi

      - name: Upload debug symbols checksum to S3
        if: inputs.checksum == true && env.PACKAGE_SYMBOLS_NAME != ''
        run: |
          S3_URI="s3://xdrsiem-packages-dev-internal/development/wazuh/5.x/main/packages"
          if [ -s "/tmp/${{ env.PACKAGE_SYMBOLS_NAME }}.sha512" ]; then
            aws s3 cp /tmp/${{ env.PACKAGE_SYMBOLS_NAME }}.sha512 $S3_URI/
          fi

  smoke-test-macos:
    needs: [upload-to-s3]
    if: success()
    uses: ./.github/workflows/5_testintegration_agent-start.yml
    with:
      base_branch: ""
      platform: "macos"
    secrets: inherit
