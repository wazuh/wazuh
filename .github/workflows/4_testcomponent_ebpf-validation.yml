name: 4.X - eBPF Field Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/syscheckd/src/ebpf/**"
      - "src/external/libbpf-bootstrap/**"
      - ".github/workflows/4_testcomponent_ebpf-validation.yml"
      - ".github/actions/ebpf_validation/**"
      - "src/Makefile"

jobs:
  ebpf-validation-amd64:
    name: eBPF Validation (amd64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      - name: Run eBPF Validation
        uses: ./.github/actions/ebpf_validation

  ebpf-validation-arm64:
    name: eBPF Validation (arm64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      - name: Run eBPF Validation (arm64 via QEMU)
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu24.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y clang llvm libelf-dev build-essential btrfs-progs xfsprogs kmod sudo
          run: |
            make -C src/ -j$(nproc) external/libbpf-bootstrap

            SRC_DIR=src
            g++ -O2 -Wall -std=c++17 \
              -I${SRC_DIR}/external/libbpf-bootstrap/build/libbpf \
              -I${SRC_DIR}/external/libbpf-bootstrap/libbpf/src \
              src/syscheckd/src/ebpf/tests/ebpf_validation/ebpf_validation_test.cpp \
              ${SRC_DIR}/external/libbpf-bootstrap/build/libbpf/libbpf.a \
              -lelf -lz -lpthread -lstdc++fs \
              -o ebpf_validation_runner

            BPF_OBJ=src/external/libbpf-bootstrap/build/modern.bpf.o
            for FS in ext4 xfs btrfs tmpfs; do
              MNT="/mnt/ebpf_test_${FS}"
              IMG="/tmp/ebpf_test_${FS}.img"
              echo "== Testing: ${FS} =="
              if [ "${FS}" != "tmpfs" ] && ! grep -q "${FS}" /proc/filesystems; then
                modprobe "${FS}" 2>/dev/null || true
                grep -q "${FS}" /proc/filesystems || { echo "Skipping ${FS}"; continue; }
              fi
              rm -rf "${MNT}" && mkdir -p "${MNT}"
              if [ "${FS}" = "tmpfs" ]; then
                mount -t tmpfs tmpfs "${MNT}"
              else
                dd if=/dev/zero of="${IMG}" bs=1M count=100 conv=sparse 2>/dev/null
                mkfs.${FS} -f -q "${IMG}" 2>/dev/null || mkfs.${FS} -F -q "${IMG}"
                mount -o loop "${IMG}" "${MNT}"
              fi
              ./ebpf_validation_runner --bpf-obj "${BPF_OBJ}" --test-dir "${MNT}"
              umount -l "${MNT}" 2>/dev/null || true
              rm -rf "${MNT}" "${IMG}"
            done
