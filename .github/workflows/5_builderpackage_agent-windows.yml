run-name: Build Wazuh agent Windows i686 - ${{ github.event.pull_request.head.ref || github.ref_name }}
name: 5.X - Build Wazuh agent Windows (MSI)

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - "src/**"
      - "packages/**"
      - ".github/workflows/5_builderpackage_agent-windows.yml"
  workflow_dispatch:
    inputs:
      revision:
        description: |
          Package revision (name and metadata).
          Default is '0'.
        required: false
        default: "0"
      debug:
        type: boolean
        description: |
          Build the binaries as debug (without optimizations).
          Default is 'false'.
        required: false
        default: false
      checksum:
        type: boolean
        description: |
          Generate package checksum.
          Default is 'false'.
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true


jobs:
  build-binaries:
    runs-on: wz-linux-amd64
    timeout-minutes: 60
    name: Build Windows agent binaries
    outputs:
      version: ${{ steps.set-version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64 g++-mingw-w64 make

      - name: Set VERSION
        id: set-version
        run: |
          VERSION="$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' VERSION.json)"
          cat << EOF | sed -e 's/^[[:space:]]*//' -e 's/\r$//' >> $GITHUB_ENV
          VERSION=$VERSION
          EOF
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Append short commit to VERSION file
        run: |
          SHORT_COMMIT=$(git rev-parse --short=7 HEAD)
          if [ -z "$SHORT_COMMIT" ]; then exit 1; fi
          sed -i '/"stage":/s/$/,/; /"stage":/a \    "commit": "'"$SHORT_COMMIT"'"' VERSION.json || exit 1

      - name: Build Windows dependencies
        run: make -C src deps TARGET=winagent -j$(nproc)

      - name: Build Windows agent
        run: make -C src TARGET=winagent -j$(nproc)

      - name: Upload compiled binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            src/
            VERSION.json
          retention-days: 1

  build-package:
    needs: build-binaries
    runs-on: windows-2022
    timeout-minutes: 30
    name: Generate MSI package

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download compiled binaries
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: compiled-binaries

      - name: Copy binaries to workspace
        shell: bash
        run: |
          cp -r compiled-binaries/src/* src/ || true
          cp compiled-binaries/VERSION.json . || true
          ls -la src/build/bin/*.exe src/build/lib/*.dll || true

      - name: Set PKG_NAME
        shell: bash
        run: |
          VERSION="${{ needs.build-binaries.outputs.version }}"
          COMMIT_HASH="$(git rev-parse --short=7 HEAD)"
          REVISION="${{ inputs.revision || '0' }}"
          cat << EOF | sed -e 's/^[[:space:]]*//' -e 's/\r$//' >> $GITHUB_ENV
          VERSION=$VERSION
          PKG_NAME=wazuh-agent_${VERSION}-${REVISION}_windows_${COMMIT_HASH}
          PKG_NAME_SYMBOLS_SHORT=wazuh-agent-debug-symbols_${VERSION}-${REVISION}_windows_${COMMIT_HASH}
          PACKAGE_SYMBOLS_NAME=wazuh-agent-debug-symbols_${VERSION}-${REVISION}_windows_${COMMIT_HASH}
          EOF

      - name: Disable signing in MSI script
        shell: bash
        run: |
          sed -i 's+signtool+::signtool+g' src/win32/wazuh-installer-build-msi.bat
          sed -i 's+pause+::pause+g' src/win32/wazuh-installer-build-msi.bat

      - name: Copy generation script
        shell: bash
        run: cp packages/windows/generate_wazuh_msi.ps1 src/win32/

      - name: Download cv2pdb for debug symbols
        shell: pwsh
        run: |
          $cv2pdbUrl = "https://github.com/rainers/cv2pdb/releases/download/v0.52/cv2pdb-0.52.zip"
          Invoke-WebRequest -Uri $cv2pdbUrl -OutFile cv2pdb.zip
          Expand-Archive -Path cv2pdb.zip -DestinationPath cv2pdb_temp
          Copy-Item cv2pdb_temp/cv2pdb.exe src/win32/
          if (-not (Test-Path "src/win32/cv2pdb.exe")) { exit 1 }

      - name: Generate MSI package
        id: build
        shell: pwsh
        run: |
          cd src/win32
          ./generate_wazuh_msi.ps1 -MSI_NAME ${{ env.PKG_NAME }}.msi -SIGN no

          $PACKAGE_NAME = "${env:PKG_NAME}.msi"
          $PACKAGE_SYMBOLS_NAME = ""
          if (Test-Path "${env:PKG_NAME_SYMBOLS_SHORT}.zip") {
            $PACKAGE_SYMBOLS_NAME = "${env:PACKAGE_SYMBOLS_NAME}.zip"
            Rename-Item "${env:PKG_NAME_SYMBOLS_SHORT}.zip" "$PACKAGE_SYMBOLS_NAME"
          }

          @"
          PACKAGE_NAME=$PACKAGE_NAME
          PACKAGE_SYMBOLS_NAME=$PACKAGE_SYMBOLS_NAME
          VERSION=$env:VERSION
          "@ > metadata.env

          @"
          PACKAGE_NAME=$PACKAGE_NAME
          PACKAGE_SYMBOLS_NAME=$PACKAGE_SYMBOLS_NAME
          "@ >> $env:GITHUB_ENV

      - name: Generate checksums
        if: inputs.checksum == true
        shell: bash
        run: |
          cd src/win32
          sha512sum "${{ env.PACKAGE_NAME }}" > "${{ env.PACKAGE_NAME }}.sha512"
          if [ -n "${{ env.PACKAGE_SYMBOLS_NAME }}" ] && [ -f "${{ env.PACKAGE_SYMBOLS_NAME }}" ]; then
            sha512sum "${{ env.PACKAGE_SYMBOLS_NAME }}" > "${{ env.PACKAGE_SYMBOLS_NAME }}.sha512"
          fi

      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: metadata-windows
          path: src/win32/metadata.env
          retention-days: 1

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: src/win32/${{ env.PACKAGE_NAME }}
          retention-days: 7

      - name: Upload debug symbols as artifact
        if: env.PACKAGE_SYMBOLS_NAME != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_SYMBOLS_NAME }}
          path: src/win32/${{ env.PACKAGE_SYMBOLS_NAME }}
          retention-days: 7

      - name: Upload checksums as artifacts
        if: inputs.checksum == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-checksums
          path: |
            src/win32/${{ env.PACKAGE_NAME }}.sha512
            src/win32/${{ env.PACKAGE_SYMBOLS_NAME }}.sha512
          retention-days: 7

  test-package:
    needs: build-package
    runs-on: windows-2022
    timeout-minutes: 30
    name: Test MSI package

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download metadata
        uses: actions/download-artifact@v4
        with:
          name: metadata-windows
          path: src/win32

      - name: Load metadata
        shell: bash
        run: tr -d '\r' < src/win32/metadata.env >> $GITHUB_ENV

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: src/win32

      - name: Test install Windows agent
        shell: pwsh
        run: |
          Start-Process -FilePath "src/win32/${{ env.PACKAGE_NAME }}" -ArgumentList '/q WAZUH_MANAGER="1.1.1.1" /l installer.log' -Wait
          $installerfile = Get-Content installer.log
          if (-not ($installerfile -match "Wazuh Agent -- Installation completed successfully")) { exit 1 }

      - name: Set up Python virtual environment
        shell: pwsh
        run: |
          python -m venv checkfiles_env
          & checkfiles_env\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          python -m pip install -r .github/actions/check_files/requirements.txt

      - name: Check installed files
        shell: pwsh
        run: |
          & checkfiles_env\Scripts\Activate.ps1
          net stop WazuhSvc
          python .github/actions/check_files/check_files.py -f .github/actions/check_files/windows_agent_base.csv --wazuh_gid -1 --wazuh_uid -1 --directory "C:\Program Files (x86)\ossec-agent"
          python .github/actions/check_files/check_files.py -b windows_actual_state.csv --wazuh_gid -1 --wazuh_uid -1 --directory "C:\Program Files (x86)\ossec-agent"
          Get-Content windows_actual_state.csv

      - name: Get last stable version
        id: last-stable-version
        uses: ./.github/actions/5_builderpackage_get-last-stable-version
        with:
          repo_owner: wazuh
          repo_name: wazuh
          testing_version: ${{ env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get package url of the last stable version
        id: upgrade-package-url
        uses: ./.github/actions/5_builderpackage_get-upgrade-test-package-url
        with:
          component: agent
          os: windows
          version: ${{ steps.last-stable-version.outputs.latest_stable_version }}

      - name: Prepare package for upgrade test
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\win-agent-base
          Copy-Item "src/win32/${{ env.PACKAGE_NAME }}" -Destination "C:\win-agent-base\" -Force

      - name: Test upgrade
        uses: ./.github/actions/5_builderpackage_windows-smoke-upgrade-test
        with:
          old_package_url: ${{ steps.upgrade-package-url.outputs.testing_package_url }}
          expected_upgrade_version: ${{ env.VERSION }}

  upload-to-s3:
    needs: [build-package, test-package]
    if: success()
    runs-on: wz-linux-amd64
    timeout-minutes: 15
    name: Upload MSI to S3

    steps:
      - name: Download metadata
        uses: actions/download-artifact@v4
        with:
          name: metadata-windows
          path: /tmp

      - name: Load metadata
        run: tr -d '\r' < /tmp/metadata.env >> $GITHUB_ENV

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: /tmp

      - name: Download debug symbols artifacts
        if: env.PACKAGE_SYMBOLS_NAME != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_SYMBOLS_NAME }}
          path: /tmp

      - name: Download package checksum
        if: inputs.checksum == true
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-checksums
          path: /tmp

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CI_INTERNAL_DEVELOPMENT_BUCKET_USER_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.CI_INTERNAL_DEVELOPMENT_BUCKET_USER_SECRET_KEY }}
          aws-region: ${{ secrets.CI_AWS_REGION }}

      - name: Upload package to S3
        run: |
          S3_URI="s3://xdrsiem-packages-dev-internal/development/wazuh/5.x/main/packages"
          if [ -s "/tmp/${{ env.PACKAGE_NAME }}" ]; then
            aws s3 cp /tmp/${{ env.PACKAGE_NAME }} $S3_URI/
          else
            exit 1
          fi

      - name: Upload checksum to S3
        if: inputs.checksum == true
        run: |
          S3_URI="s3://xdrsiem-packages-dev-internal/development/wazuh/5.x/main/packages"
          if [ -s "/tmp/${{ env.PACKAGE_NAME }}.sha512" ]; then
            aws s3 cp /tmp/${{ env.PACKAGE_NAME }}.sha512 $S3_URI/
          fi

      - name: Upload debug symbols to S3
        if: env.PACKAGE_SYMBOLS_NAME != ''
        run: |
          S3_URI="s3://xdrsiem-packages-dev-internal/development/wazuh/5.x/main/packages"
          if [ -s "/tmp/${{ env.PACKAGE_SYMBOLS_NAME }}" ]; then
            aws s3 cp /tmp/${{ env.PACKAGE_SYMBOLS_NAME }} $S3_URI/
          fi

      - name: Upload debug symbols checksum to S3
        if: inputs.checksum == true && env.PACKAGE_SYMBOLS_NAME != ''
        run: |
          S3_URI="s3://xdrsiem-packages-dev-internal/development/wazuh/5.x/main/packages"
          if [ -s "/tmp/${{ env.PACKAGE_SYMBOLS_NAME }}.sha512" ]; then
            aws s3 cp /tmp/${{ env.PACKAGE_SYMBOLS_NAME }}.sha512 $S3_URI/
          fi

  smoke-test-windows:
    needs: [upload-to-s3]
    if: success()
    uses: ./.github/workflows/5_testintegration_agent-start.yml
    with:
      base_branch: ""
      platform: "windows"
    secrets: inherit
