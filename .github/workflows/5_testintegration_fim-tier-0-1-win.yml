name: 5.X - FIM on Windows - Integration tests - Tier 0 and 1

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Base branch'
        required: true
        default: 'main'
  pull_request:
    paths:
      - ".github/workflows/5_testintegration_fim-tier-0-1-win.yml"
      - "src/config/src/syscheck-config.c"
      - "src/config/include/syscheck-config.h"
      - "src/syscheckd/**"
      - "src/Makefile"
      - "tests/integration/conftest.py"
      - "tests/integration/test_fim/**"

jobs:
  build:
    runs-on: wz-linux-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update || exit 1
          sudo apt-get install gcc-mingw-w64 g++-mingw-w64-i686 g++-mingw-w64-x86-64 -y || exit 1

      - uses: ./.github/actions/reinstall_cmake

      - name: Build wazuh agent for windows
        run: |
          make deps -C src TARGET=winagent -j$(nproc) || exit 1
          make -C src TARGET=winagent -j$(nproc) || exit 1
          rm -rf .git || exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: winagent-repo
          path: .
          include-hidden-files: true

  run-test:
    needs: build
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      BRANCH_BASE: ${{ github.base_ref || inputs.base_branch || 'main' }}
    runs-on: windows-2022

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version-file: ".github/workflows/.python-version-it"
          architecture: x64

      - name: Add WiX toolkit to PATH
        shell: bash
        run: echo "${WIX}bin" >> $GITHUB_PATH

      - uses: actions/download-artifact@v4
        with:
          name: winagent-repo
          path: C:\wazuh\

      - name: Build and Install wazuh agent
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location C:\wazuh\src\win32

          .\wazuh-installer-build-msi.bat
          if ($LASTEXITCODE -ne 0) { exit 1 }

          $msiFile = (Get-ChildItem -Filter "wazuh-agent-*.msi").FullName
          if (-not $msiFile) {
              Write-Error "MSI file not found."
              exit 1
          }

          Start-Process -FilePath "msiexec.exe" -ArgumentList "/i `"$msiFile`" /q WAZUH_MANAGER=`"127.0.0.1`"" -Wait -NoNewWindow

      - name: Download and install qa-integration-framework
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location C:\wazuh
          $VERSION = (Get-Content -Raw VERSION.json | ConvertFrom-Json).version
          $QA_BRANCH = "main"
          $branchesToTest = @($env:BRANCH_NAME, $env:BRANCH_BASE, $VERSION)

          foreach ($b in $branchesToTest) {
              if (-not [string]::IsNullOrWhiteSpace($b)) {
                  $cmd = git ls-remote https://github.com/wazuh/qa-integration-framework.git $b 2>$null
                  if ($cmd) {
                      $QA_BRANCH = $b
                      break
                  }
              }
          }

          git clone -b $QA_BRANCH --single-branch https://github.com/wazuh/qa-integration-framework.git
          if ($LASTEXITCODE -ne 0) { exit 1 }

          python -m venv venv
          .\venv\Scripts\python.exe -m pip install --upgrade pip
          .\venv\Scripts\python.exe -m pip install qa-integration-framework/
          Remove-Item qa-integration-framework -Recurse -Force

      - name: Run fim integration tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          net start wazuh
          if ($LASTEXITCODE -ne 0) { exit 1 }

          Set-Location C:\wazuh\tests\integration
          $env:GITHUB_SHA="${{ github.sha }}"
          $env:GITHUB_REF_NAME="$env:BRANCH_NAME"

          ..\..\venv\Scripts\python.exe -m pytest --tier 0 --tier 1 test_fim\ --html=results.html --self-contained-html
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fim-tier-0-1-win-test-results-${{ github.run_id }}
          path: C:\wazuh\tests\integration\results.html
          retention-days: 7
