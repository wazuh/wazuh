name: 5.X - FIM on Windows - Integration tests - Tier 0 and 1

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Base branch'
        required: true
        default: 'main'
  pull_request:
    paths:
        - ".github/workflows/5_testintegration_fim-tier-0-1-win.yml"
        - "src/config/src/syscheck-config.c"
        - "src/config/include/syscheck-config.h"
        - "src/syscheckd/**"
        - "src/Makefile"
        - "tests/integration/conftest.py"
        - "tests/integration/test_fim/**"

jobs:
  # Build the winagent on linux.
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      # Install wingw required to build the winagent.
      - name: Install dependencies
        run: sudo apt install gcc-mingw-w64 g++-mingw-w64-i686 g++-mingw-w64-x86-64 -y
      - name: "Install a compatible CMake"
        uses: ./.github/actions/reinstall_cmake
      # Build winagent.
      - name: Build wazuh agent for windows
        run: |
          make deps -C src TARGET=winagent -j2
          make -C src TARGET=winagent -j2
      # Compress the files generated by the build.
      - name: Compress the winagent build
        run: cd .. && zip -r wazuh.zip wazuh -x "wazuh/.git/*"
      # Make folder and save the compressed build as artifacts.
      - name: Save compressed build
        run: |
          mkdir -p src/winagent
          cp ../wazuh.zip src/winagent/wazuh.zip
      # Upload build artifacts.
      - name: Upload Artifact winagent
        uses: actions/upload-artifact@v4
        with:
          name: winagent
          path: src/winagent
  package:
    needs: build
    runs-on: windows-2025
    name: Build wazuh installer
    outputs:
      package-artifact-name: ${{ steps.package-metadata.outputs.package_artifact_name }}
      package-file-name: ${{ steps.package-metadata.outputs.package_file_name }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Add WiX toolkit to PATH
        shell: bash
        run: echo "${WIX}bin" >> $GITHUB_PATH
      # Download the compressed winagent build.
      - name: Download Artifact winagent
        uses: actions/download-artifact@v4
        with:
          name: winagent
          path: C:\winagent\
      # Decompress the winagent files.
      - name: Decompress wazuh
        run: |
          Expand-Archive -LiteralPath C:\winagent\wazuh.zip -DestinationPath C:\
      - name: Set package metadata
        id: package-metadata
        shell: pwsh
        run: |
          $version = (Get-Content -Raw VERSION.json | ConvertFrom-Json).version
          $revision = "0"
          $packageFileName = "wazuh-agent-$version-$revision.msi"
          $packageArtifactName = "winagent-package-$version-$revision"

          "version=$version" >> $env:GITHUB_OUTPUT
          "revision=$revision" >> $env:GITHUB_OUTPUT
          "package_file_name=$packageFileName" >> $env:GITHUB_OUTPUT
          "package_artifact_name=$packageArtifactName" >> $env:GITHUB_OUTPUT
      # Build the winagent installer once and reuse it across shards.
      - name: Build wazuh installer
        run: |
          cd  C:\wazuh\src\win32
          .\wazuh-installer-build-msi.bat "${{ steps.package-metadata.outputs.version }}" "${{ steps.package-metadata.outputs.revision }}"
      - name: Upload Artifact wazuh package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package-metadata.outputs.package_artifact_name }}
          path: C:\wazuh\src\win32\${{ steps.package-metadata.outputs.package_file_name }}
  # Execute the tests on windows.
  run-test:
    needs: package
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_name: tier-0
            pytest_tier_args: "--tier 0"
          - shard_name: tier-1
            pytest_tier_args: "--tier 1"
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      BRANCH_BASE: ${{ github.base_ref || inputs.base_branch }}
    runs-on: windows-2025
    name: Run FIM integration tests (${{ matrix.shard_name }})
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version-file: ".github/workflows/.python-version-it"
          architecture: x64
      - name: Download Artifact wazuh package
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.package-artifact-name }}
          path: C:\wazuh-package\
      # Install the windows agent.
      - name: Install wazuh agent
        run: |
          cd  C:\wazuh-package
          .\${{ needs.package.outputs.package-file-name }} /q WAZUH_MANAGER="127.0.0.1"
      # Download and install integration tests framework.
      - name: Download and install qa-integration-framework
        shell: pwsh
        run: |
          # Read version from VERSION.json
          $VERSION = (Get-Content -Raw VERSION.json | ConvertFrom-Json).version
          if (git ls-remote https://github.com/wazuh/qa-integration-framework.git $env:BRANCH_NAME) {
              $QA_BRANCH = $env:BRANCH_NAME
          } elseif (git ls-remote https://github.com/wazuh/qa-integration-framework.git $env:BRANCH_BASE) {
              $QA_BRANCH = $env:BRANCH_BASE
          } elseif (git ls-remote https://github.com/wazuh/qa-integration-framework.git $VERSION) {
              $QA_BRANCH = $VERSION
          } else {
              $QA_BRANCH = "main"
          }
          git clone -b $QA_BRANCH --single-branch https://github.com/wazuh/qa-integration-framework.git
          pip install qa-integration-framework/
          Remove-Item qa-integration-framework -Recurse -Force
      - name: Copy integration tests to C:\wazuh
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\wazuh\tests | Out-Null
          Copy-Item -Path "$env:GITHUB_WORKSPACE\tests\*" -Destination C:\wazuh\tests -Recurse -Force
      # Run fim integration tests.
      - name: Run fim integration tests
        run: |
          NET START wazuh
          cd C:\wazuh\tests\integration
          $env:GITHUB_SHA="${{ github.sha }}"; $env:GITHUB_REF_NAME="$env:BRANCH_NAME"; python -m pytest ${{ matrix.pytest_tier_args }} test_fim\ --html=results.html --self-contained-html
      # Upload the tests result html as an artifact
      - name: Upload failed test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fim-tier-0-1-win-${{ matrix.shard_name }}-test-results-${{ github.run_id }}
          path: C:\wazuh\tests\integration\results.html
          retention-days: 7
