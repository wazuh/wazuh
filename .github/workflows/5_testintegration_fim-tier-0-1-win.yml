name: 5.X - FIM on Windows - Integration tests - Tier 0 and 1

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Base branch'
        required: true
        default: 'main'
  pull_request:
    paths:
        - ".github/workflows/5_testintegration_fim-tier-0-1-win.yml"
        - ".github/workflows/5_builderpackage_agent-windows.yml"
        - "src/config/src/syscheck-config.c"
        - "src/config/include/syscheck-config.h"
        - "src/syscheckd/**"
        - "src/Makefile"
        - "tests/integration/conftest.py"
        - "tests/integration/test_fim/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # Execute the tests on windows.
  run-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_name: tier-0
            pytest_tier_args: "--tier 0"
          - shard_name: tier-1
            pytest_tier_args: "--tier 1"
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      BRANCH_BASE: ${{ github.base_ref || inputs.base_branch }}
      BUILD_WORKFLOW: 5_builderpackage_agent-windows.yml
      AGENT_PACKAGE_REGEXP: wazuh-agent.*windows.*\.msi
      # For pull_request events GITHUB_SHA is the merge commit SHA, not the PR
      # head commit. The builder workflow run's head_sha is the PR head SHA, so
      # we must use that to locate the builder run and its artifacts.
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    runs-on: windows-2025
    name: Run FIM integration tests (${{ matrix.shard_name }})
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version-file: ".github/workflows/.python-version-it"
          architecture: x64
      - name: Wait for Windows builder workflow
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $waitScript = @'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request

          repo = os.environ['GITHUB_REPOSITORY']
          # PR_HEAD_SHA is the actual branch HEAD; GITHUB_SHA on pull_request
          # events is the merge commit SHA which won't match the builder's head_sha.
          sha = os.environ.get('PR_HEAD_SHA') or os.environ['GITHUB_SHA']
          workflow = '5_builderpackage_agent-windows.yml'
          token = os.environ['GITHUB_TOKEN']

          base_url = f"https://api.github.com/repos/{repo}/actions/workflows/{workflow}/runs"
          params = urllib.parse.urlencode({'head_sha': sha, 'event': 'pull_request', 'per_page': 20})
          url = f"{base_url}?{params}"

          headers = {
            'Accept': 'application/vnd.github+json',
            'Authorization': f'Bearer {token}',
            'User-Agent': 'wazuh-fim-win-wait-builder'
          }

          deadline = time.time() + (90 * 60)

          while time.time() < deadline:
            req = urllib.request.Request(url, headers=headers)
            with urllib.request.urlopen(req) as response:
              data = json.loads(response.read().decode())

            runs = data.get('workflow_runs', [])
            if not runs:
              print('No builder runs found for this commit yet. Retrying in 30 seconds...')
              time.sleep(30)
              continue

            completed = [r for r in runs if r.get('status') == 'completed']
            success = [r for r in completed if r.get('conclusion') == 'success']

            if success:
              print(f"Builder workflow succeeded for commit {sha}.")
              break

            failed = [r for r in completed if r.get('conclusion') in ('failure', 'cancelled', 'timed_out', 'action_required')]
            if failed:
              last = sorted(failed, key=lambda r: r.get('updated_at', ''), reverse=True)[0]
              raise SystemExit(
                f"Builder workflow finished with conclusion '{last.get('conclusion')}' for this commit. "
                f"Run URL: {last.get('html_url')}"
              )

            print('Builder workflow is still running. Retrying in 30 seconds...')
            time.sleep(30)
          else:
            raise SystemExit('Timeout waiting for successful Windows builder workflow.')
          '@

          $scriptPath = Join-Path $env:RUNNER_TEMP 'wait_builder.py'
          Set-Content -Path $scriptPath -Value $waitScript -Encoding UTF8
          python $scriptPath
      - name: Download MSI package artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ${{ env.BUILD_WORKFLOW }}
          workflow_conclusion: success
          commit: ${{ env.PR_HEAD_SHA }}
          name_is_regexp: true
          name: ${{ env.AGENT_PACKAGE_REGEXP }}
          path: C:\wazuh-package\
          if_no_artifact_found: fail
          check_artifacts: true
          search_artifacts: true
      # Install the windows agent.
      - name: Install wazuh agent
        shell: pwsh
        run: |
          $package = Get-ChildItem -Path "C:\wazuh-package" -Filter "wazuh-agent*windows*.msi" -File -Recurse | Where-Object { $_.Name -notmatch 'debug' } | Select-Object -First 1
          if (-not $package) {
            Write-Host "ERROR: No MSI package found in C:\wazuh-package"
            Get-ChildItem -Path "C:\wazuh-package" -Recurse | Format-Table Name, FullName
            exit 1
          }

          Start-Process msiexec.exe -ArgumentList "/i `"$($package.FullName)`" /q WAZUH_MANAGER=`"127.0.0.1`"" -Wait -NoNewWindow
      # Download and install integration tests framework.
      - name: Download and install qa-integration-framework
        shell: pwsh
        run: |
          # Read version from VERSION.json
          $VERSION = (Get-Content -Raw VERSION.json | ConvertFrom-Json).version
          if (git ls-remote https://github.com/wazuh/qa-integration-framework.git $env:BRANCH_NAME) {
              $QA_BRANCH = $env:BRANCH_NAME
          } elseif (git ls-remote https://github.com/wazuh/qa-integration-framework.git $env:BRANCH_BASE) {
              $QA_BRANCH = $env:BRANCH_BASE
          } elseif (git ls-remote https://github.com/wazuh/qa-integration-framework.git $VERSION) {
              $QA_BRANCH = $VERSION
          } else {
              $QA_BRANCH = "main"
          }
          git clone -b $QA_BRANCH --single-branch https://github.com/wazuh/qa-integration-framework.git
          pip install qa-integration-framework/
          Remove-Item qa-integration-framework -Recurse -Force
      - name: Copy integration tests to C:\wazuh
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\wazuh\tests | Out-Null
          Copy-Item -Path "$env:GITHUB_WORKSPACE\tests\*" -Destination C:\wazuh\tests -Recurse -Force
      # Run fim integration tests.
      - name: Run fim integration tests
        run: |
          NET START wazuh
          cd C:\wazuh\tests\integration
          $env:GITHUB_SHA="${{ github.sha }}"; $env:GITHUB_REF_NAME="$env:BRANCH_NAME"; python -m pytest ${{ matrix.pytest_tier_args }} test_fim\ --html=results.html --self-contained-html
      # Upload the tests result html as an artifact
      - name: Upload failed test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fim-tier-0-1-win-${{ matrix.shard_name }}-test-results-${{ github.run_id }}
          path: C:\wazuh\tests\integration\results.html
          retention-days: 7
