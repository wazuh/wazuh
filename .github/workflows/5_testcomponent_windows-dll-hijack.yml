name: 5.X - Testing DLL search order to prevent hijack

on:
  workflow_dispatch:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - "src/**"
      - ".github/workflows/5_testcomponent_windows-dll-hijack.yml"
      - ".github/actions/reinstall_cmake/**"
      - "!src/engine/**"
      - "!src/remoted/**"
      - "!src/util/**"
      - "!src/shared_modules/indexer_connector/**"
      - "!src/shared_modules/keystore/**"
      # Only src/ for these server trees: agent modules compile against their include/
      - "!src/monitord/src/**"
      - "!src/os_auth/src/**"
      - "!src/wazuh_db/src/**"
      - "!src/wazuh_db/schemas/**"
      - "!src/shared_modules/content_manager/src/**"
      - "!src/shared_modules/router/src/**"
      - "!src/wazuh_modules/vulnerability_scanner/src/**"
      - "!src/wazuh_modules/inventory_sync/src/**"
      # Test trees: UNIT_TEST-gated, never built by this workflow
      - "!src/unit_tests/**"
      - "!src/**/tests/**"
      - "!src/**/integrationTests/**"
      # qa/ suites run in other workflows; win32/qa stays (executed here)
      - "!src/data_provider/qa/**"
      - "!src/shared_modules/indexer_connector/qa/**"
      - "!src/shared_modules/keystore/qa/**"
      - "!src/wazuh_modules/inventory_sync/qa/**"
      - "!src/wazuh_modules/vulnerability_scanner/qa/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: codebuild-github-actions-codebuild-runner-server-amd-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw
        run: |
          sudo apt-get update || exit 1
          sudo apt-get install gcc-mingw-w64 g++-mingw-w64-i686 g++-mingw-w64-x86-64 make -y || exit 1

      - uses: ./.github/actions/reinstall_cmake

      - name: make deps
        run: make -C src deps TARGET=winagent -j2 || exit 1

      - name: make
        run: make -C src TARGET=winagent -j2 IMAGE_TRUST_CHECKS=2 || exit 1

      - name: Copy executables
        run: |
          mkdir -p src/exe_files || exit 1
          cp src/build/bin/*.exe src/exe_files/ || exit 1
          rm -f src/exe_files/*_test_tool.exe || exit 1
          rm -f src/exe_files/*_example.exe || exit 1
          cp src/build/bin/*.dll src/exe_files/ 2>/dev/null || true
          cp src/build/lib/*.dll src/exe_files/ 2>/dev/null || true

      - uses: ./.github/actions/upload_s3_artifact
        with:
          aws_region: ${{ secrets.CI_AWS_REGION }}
          bucket: ${{ secrets.CI_INTERNAL_S3_BUCKET }}
          aws_role: ${{ secrets.CI_OIDC_ROLE_ARN }}
          name: executables
          path: src/exe_files

      - name: Copy configuration files
        run: |
          mkdir -p src/configuration_files || exit 1
          sed -i 's+<log_format>plain</log_format>+<log_format>plain,json</log_format>+g' src/win32/ossec.conf || exit 1
          cp src/win32/ossec.conf src/configuration_files/ || exit 1
          sed -i 's+windows.debug=0+windows.debug=2+g' etc/internal_options.conf || exit 1
          cp etc/internal_options.conf src/configuration_files/internal_options.conf || exit 1

      - uses: ./.github/actions/upload_s3_artifact
        with:
          aws_region: ${{ secrets.CI_AWS_REGION }}
          bucket: ${{ secrets.CI_INTERNAL_S3_BUCKET }}
          aws_role: ${{ secrets.CI_OIDC_ROLE_ARN }}
          name: configuration
          path: src/configuration_files

  check_dll_on_windows:
    # NOTE: stays on the GitHub-hosted Windows runner. This test drives Process Monitor, which
    # captures via a kernel minifilter driver. CodeBuild's Windows fleet runs process-isolated
    # containers (no FltMgr / kernel-driver loading), so Procmon captures zero events there.
    runs-on: windows-2025
    timeout-minutes: 30
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".github/workflows/.python-version"
          architecture: x64

      - uses: ./.github/actions/download_s3_artifact
        with:
          aws_region: ${{ secrets.CI_AWS_REGION }}
          bucket: ${{ secrets.CI_INTERNAL_S3_BUCKET }}
          aws_role: ${{ secrets.CI_OIDC_ROLE_ARN }}
          name: executables
          path: C:\executables\

      - uses: ./.github/actions/download_s3_artifact
        with:
          aws_region: ${{ secrets.CI_AWS_REGION }}
          bucket: ${{ secrets.CI_INTERNAL_S3_BUCKET }}
          aws_role: ${{ secrets.CI_OIDC_ROLE_ARN }}
          name: configuration
          path: C:\configuration_files\

      - name: Copy configuration files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Copy-Item C:\configuration_files\*.conf C:\executables\ -Force

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python -m pip install --upgrade pip
          python -m pip install -r src/win32/qa/requirements.txt

      - name: Download Process Monitor
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri "https://download.sysinternals.com/files/ProcessMonitor.zip" -OutFile "C:\ProcessMonitor.zip"
          Expand-Archive -Path "C:\ProcessMonitor.zip" -DestinationPath "C:\ProcessMonitor" -Force

      - name: Run tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location -Path src/win32/qa
          Copy-Item *.pmc C:\executables\ -Force
          python -m pytest -vv ./test_dll_hijack.py
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - if: always()
        uses: ./.github/actions/upload_s3_artifact
        with:
          aws_region: ${{ secrets.CI_AWS_REGION }}
          bucket: ${{ secrets.CI_INTERNAL_S3_BUCKET }}
          aws_role: ${{ secrets.CI_OIDC_ROLE_ARN }}
          name: csv_files_${{ matrix.os }}
          path: C:\executables\*.csv
