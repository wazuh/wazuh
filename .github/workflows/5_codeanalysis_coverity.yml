name: 5.X - Coverity Scan

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Project (use ossec-wazuh for development)"
        required: true
        type: choice
        options:
          - wazuh
          - ossec-wazuh
      threads:
        description: "Number of threads for make -j (0 = auto)"
        required: false
        default: 0
        type: number
      target:
        description: "Compilation target (manager or agent)"
        required: true
        type: choice
        default: 'manager'
        options:
          - manager
          - agent
      docker_image_tag:
        description: |
          Tag name of the Docker image to be uploaded.
          Use only '-', '_', '.' and alphanumeric characters.
          Default is '5.x'.
        required: false
        default: '5.x'

env:
  REGISTRY: ghcr.io

permissions:
  id-token: write
  contents: read

jobs:
  prepare:
    runs-on: codebuild-github-actions-codebuild-runner-server-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      project: ${{ steps.vars.outputs.PROJECT }}
      jobs: ${{ steps.vars.outputs.JOBS }}
      version: ${{ steps.vars.outputs.VERSION }}
      description: ${{ steps.vars.outputs.DESCRIPTION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Ensure jq (CodeBuild)
        # TODO(codebuild-temp): Remove once the CodeBuild server image ships jq.
        # GitHub-hosted ubuntu-24.04 bundled jq; the variables step below parses VERSION.json with it.
        run: command -v jq >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y jq; }

      - name: Set up project and build variables
        id: vars
        env:
          INPUT_PROJECT: ${{ github.event.inputs.project }}
          INPUT_THREADS: ${{ github.event.inputs.threads }}
        run: |
          if [[ "$INPUT_PROJECT" == "wazuh" ]]; then
            echo "PROJECT=wazuh/wazuh" >> $GITHUB_OUTPUT
          else
            echo "PROJECT=wazuh/ossec-wazuh" >> $GITHUB_OUTPUT
          fi

          if [[ $INPUT_THREADS -le 0 ]]; then
            echo "JOBS=$(nproc)" >> $GITHUB_OUTPUT
          else
            echo "JOBS=$INPUT_THREADS" >> $GITHUB_OUTPUT
          fi

          VERSION=$(jq -r '.version + "-" + .stage' VERSION.json)
          DESCRIPTION="Version $VERSION - Git ref ${{ github.ref_name }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "DESCRIPTION=$DESCRIPTION" >> $GITHUB_OUTPUT

  build:
    runs-on: codebuild-github-actions-codebuild-runner-server-amd-${{ github.run_id }}-${{ github.run_attempt }}
    needs: prepare
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download dependencies
        run: make -C src deps TARGET=${{ github.event.inputs.target }} -j${{ needs.prepare.outputs.jobs }}

      - name: Start Docker daemon (CodeBuild)
        # TODO(codebuild-temp): Remove once CodeBuild exposes a running Docker daemon.
        # The Coverity build runs inside the coverity-scan container (docker run); CodeBuild has
        # no systemd so dockerd never starts on its own. VFS avoids overlay-on-overlay in-container.
        run: |
          if ! docker info >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
            sudo nohup dockerd --storage-driver vfs > /var/log/dockerd.log 2>&1 &
            timeout 60 bash -c 'until docker info >/dev/null 2>&1; do sleep 1; done'
            sudo chmod 666 /var/run/docker.sock
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Print variables
        env:
          DOCKER_IMAGE_TAG: ${{ github.event.inputs.docker_image_tag }}
        run: |
          echo Description: ${{ needs.prepare.outputs.description }}
          echo Docker Image Tag: $DOCKER_IMAGE_TAG

      - name: Build Coverity artifact
        uses: ./.github/actions/coverity/build
        with:
          command: make -C src TARGET=${{ github.event.inputs.target }} COVERITY=YES -j${{ needs.prepare.outputs.jobs }}
          docker_image_tag: ${{ github.event.inputs.docker_image_tag }}

      - name: List files
        run: ls -l cov-int/emit/*/emit-db*

      - name: Archive Coverity build
        run: tar czf wazuh.tgz cov-int

      - name: Upload Coverity artifact
        uses: ./.github/actions/upload_s3_artifact
        with:
          aws_region: ${{ secrets.CI_AWS_REGION }}
          bucket: ${{ secrets.CI_INTERNAL_S3_BUCKET }}
          aws_role: ${{ secrets.CI_OIDC_ROLE_ARN }}
          name: wazuh.tgz
          path: wazuh.tgz

  upload:
    runs-on: codebuild-github-actions-codebuild-runner-server-amd-${{ github.run_id }}-${{ github.run_attempt }}
    needs: [prepare, build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download Coverity artifact
        uses: ./.github/actions/download_s3_artifact
        with:
          aws_region: ${{ secrets.CI_AWS_REGION }}
          bucket: ${{ secrets.CI_INTERNAL_S3_BUCKET }}
          aws_role: ${{ secrets.CI_OIDC_ROLE_ARN }}
          name: wazuh.tgz

      - name: Upload to Coverity Scan
        uses: ./.github/actions/coverity/upload
        with:
          project: ${{ needs.prepare.outputs.project }}
          email: ${{ secrets.COVERITY_SCAN_NOTIFICATION_EMAIL }}
          token: ${{ github.event.inputs.project == 'wazuh' && secrets.COVERITY_SCAN_WAZUH_TOKEN || secrets.COVERITY_SCAN_OSSEC_TOKEN }}
          version: ${{ needs.prepare.outputs.version }}
          description: "${{ needs.prepare.outputs.description }}"
