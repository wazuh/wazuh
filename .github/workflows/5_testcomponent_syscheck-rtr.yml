name: 5.X - Running RTR. Module syscheck for agent/winagent targets

on:
  workflow_dispatch:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - "src/ci/**"
      - "src/build.py"
      - "src/syscheckd/**"
      - "src/unit_tests/syscheckd/**"
      - "src/Makefile"
      - ".github/workflows/5_testcomponent_syscheck-rtr.yml"
      - ".github/actions/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  rtr:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    strategy:
      fail-fast: false
      matrix:
        module: [syscheckd]
        target: [agent, winagent]
    runs-on: codebuild-github-actions-codebuild-runner-server-amd-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/install_build_deps
        with:
          target: ${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".github/workflows/.python-version"
          architecture: x64

      - uses: ./.github/actions/reinstall_cmake

      - name: Run RTR
        run: |
          cd src/ || exit 1
          python build.py --target ${{ matrix.target }} --readytoreview ${{ matrix.module }} || exit 1

      - name: Upload coverage report
        if: always()
        uses: ./.github/actions/upload_s3_artifact
        with:
          aws_region: ${{ secrets.CI_AWS_REGION }}
          bucket: ${{ secrets.CI_INTERNAL_S3_BUCKET }}
          aws_role: ${{ secrets.CI_OIDC_ROLE_ARN }}
          name: coverage_report_${{ matrix.target }}
          path: ./**/coverage_report/**
