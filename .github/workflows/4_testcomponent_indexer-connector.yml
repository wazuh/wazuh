name: 4.X - Indexer connector - Component tests

on:
  workflow_dispatch:
  pull_request:
  # Pull request events
    types: [synchronize, opened, reopened, ready_for_review]
  # Path filtering
    paths:
      - ".github/workflows/4_testcomponent_indexer-connector.yml"
      - ".github/actions/compile_and_test/action.yml"
      - ".github/actions/indexer_connector_deps/action.yml"
      - "src/shared_modules/indexer_connector/**"
      - "src/wazuh_modules/http-request/**"

jobs:
  indexer_connector-qa:
    runs-on: codebuild-github-actions-codebuild-runner-server-amd-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: "Install a compatible CMake"
        uses: ./.github/actions/reinstall_cmake

      - name: Project dependencies
        uses: ./.github/actions/indexer_connector_deps

      # indexer connector
      - name: Indexer connector
        uses: ./.github/actions/compile
        with:
          path: src/shared_modules/indexer_connector

      # Install python dependencies
      - name: Install dependencies
        run: |
          pip install -r src/shared_modules/indexer_connector/qa/requirements.txt

      - name: Log in to Docker Hub
        # TODO(codebuild-temp): Remove if CodeBuild runners ship opensearchproject/opensearch
        # or if the unauthenticated Docker Hub pull rate limit is no longer hit in CI.
        # The indexer connector tests pull opensearchproject/opensearch:latest from Docker Hub.
        # Without authentication the shared-IP rate limit (100 pulls/6 h) is quickly exhausted.
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.CI_WAZUHCI_DOCKERHUB_USER }}
          password: ${{ secrets.CI_WAZUHCI_DOCKERHUB_TOKEN }}
      # Create folder for test logs
      - name: Create folder for test logs
        run: |
          mkdir -p ${{ github.workspace }}/qa_logs

      # Run indexer connector tests.
      - name: Run tests
        run: |
          cd src
          python -m pytest -vv shared_modules/indexer_connector/qa/ --log-cli-level=DEBUG
          rm -rf tmp

      # Upload log files of the tests
      - name: Upload log files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QA log files
          path: ${{ github.workspace }}/qa_logs
