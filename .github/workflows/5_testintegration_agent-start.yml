name: 5.X - Agent Startup Smoke Test

on:
  workflow_call:
    inputs:
      base_branch:
        description: 'Base branch to download artifacts from (empty = use artifacts from current run)'
        required: false
        type: string
        default: ''
      platform:
        description: 'Platform to test (linux, windows, macos, all)'
        required: false
        type: string
        default: 'all'

  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Base branch'
        required: true
        default: 'main'
      platform:
        description: 'Platform to test'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - linux
          - windows
          - macos
# Note: Github will force this by default in June 2026, but we set it explicitly to avoid any issues with JavaScript actions in the meantime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup-matrix:
    runs-on: codebuild-github-actions-codebuild-runner-server-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Define test matrix
        id: set-matrix
        run: |
          PLATFORM="${{ inputs.platform }}"
          ENTRIES='[]'

          DEB=$(jq -cn '{
            runner: "codebuild-github-actions-codebuild-runner-server-amd-${{ github.run_id }}-${{ github.run_attempt }}", platform: "linux-deb",
            "display-name": "Linux DEB (amd64)",
            "artifact-pattern": "wazuh-agent*amd64*.deb",
            "artifact-regexp": "wazuh-agent.*amd64.*\\.deb",
            "build-workflow": "5_builderpackage_agent-linux.yml",
            "packages-path": "/tmp/packages"
          }')
          RPM=$(jq -cn '{
            runner: "codebuild-github-actions-codebuild-runner-server-amd-${{ github.run_id }}-${{ github.run_attempt }}", platform: "linux-rpm",
            "display-name": "Linux RPM (x86_64)",
            "artifact-pattern": "*x86_64*.rpm",
            "artifact-regexp": "wazuh-agent.*x86_64.*\\.rpm",
            "build-workflow": "5_builderpackage_agent-linux.yml",
            "packages-path": "/tmp/packages"
          }')
          WIN=$(jq -cn '{
            runner: "codebuild-github-actions-codebuild-runner-agent-windows-amd-${{ github.run_id }}-${{ github.run_attempt }}", platform: "windows",
            "display-name": "Windows",
            "artifact-pattern": "wazuh-agent*windows*.msi",
            "artifact-regexp": "wazuh-agent.*windows.*\\.msi",
            "build-workflow": "5_builderpackage_agent-windows.yml",
            "packages-path": "C:\\packages"
          }')
          MAC=$(jq -cn '{
            runner: "macos-15", platform: "macos",
            "display-name": "macOS (arm64)",
            "artifact-pattern": "wazuh-agent*arm64*.pkg",
            "artifact-regexp": "wazuh-agent.*arm64.*\\.pkg",
            "build-workflow": "5_builderpackage_agent-macos.yml",
            "packages-path": "/tmp/packages"
          }')

          [[ "$PLATFORM" == "all" || "$PLATFORM" == "linux"   ]] && ENTRIES=$(jq -cn --argjson e "$ENTRIES" --argjson a "$DEB" --argjson b "$RPM" '$e + [$a,$b]')
          [[ "$PLATFORM" == "all" || "$PLATFORM" == "windows" ]] && ENTRIES=$(jq -cn --argjson e "$ENTRIES" --argjson a "$WIN" '$e + [$a]')
          [[ "$PLATFORM" == "all" || "$PLATFORM" == "macos"   ]] && ENTRIES=$(jq -cn --argjson e "$ENTRIES" --argjson a "$MAC" '$e + [$a]')

          if [ "$(echo "$ENTRIES" | jq 'length')" -eq 0 ]; then
            echo "ERROR: No platforms selected. Invalid platform value: '$PLATFORM'. Valid values: all, linux, windows, macos"
            exit 1
          fi

          echo "matrix=$(jq -cn --argjson entries "$ENTRIES" '{include: $entries}')" >> $GITHUB_OUTPUT

  test:
    permissions:
      id-token: write
      contents: read
    name: Test ${{ matrix.display-name }} startup
    needs: setup-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve S3 source (build run id + producer workflow)
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BUILD_WF: ${{ matrix.build-workflow }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # producer_workflow is the build workflow filename without the .yml extension
          echo "producer_workflow=${BUILD_WF%.yml}" >> "$GITHUB_OUTPUT"
          if [ -z "${BASE_BRANCH}" ]; then
            # Empty base_branch: the packages were built earlier in this same run.
            echo "build_run_id=${CURRENT_RUN_ID}" >> "$GITHUB_OUTPUT"
          else
            # Manual dispatch against a branch: use the latest successful build run there.
            rid="$(gh run list --repo "${REPO}" --workflow "${BUILD_WF}" --branch "${BASE_BRANCH}" --status success --limit 1 --json databaseId --jq '.[0].databaseId' || true)"
            if [ -z "${rid}" ] || [ "${rid}" = "null" ]; then
              echo "::error::No successful ${BUILD_WF} run found on branch ${BASE_BRANCH}"
              exit 1
            fi
            echo "build_run_id=${rid}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download package artifact
        uses: ./.github/actions/download_package
        with:
          build_run_id: ${{ steps.resolve.outputs.build_run_id }}
          producer_workflow: ${{ steps.resolve.outputs.producer_workflow }}
          name_regexp: ${{ matrix.artifact-regexp }}
          path: ${{ matrix.packages-path }}
          bucket: ${{ secrets.CI_INTERNAL_S3_BUCKET }}
          aws_role: ${{ secrets.CI_OIDC_ROLE_ARN }}
          aws_region: ${{ secrets.CI_AWS_REGION }}

      - name: CodeBuild workarounds (Linux Docker)
        # The Linux smoke test runs the package inside a Docker container, but
        # CodeBuild has no systemd so dockerd never starts on its own. VFS avoids
        # overlay-on-overlay, which is unsupported inside the CodeBuild container.
        # TODO: Remove once DevOps exposes host Docker socket or configures DinD in CodeBuild.
        if: matrix.platform == 'linux-deb' || matrix.platform == 'linux-rpm'
        run: |
          if ! docker info &>/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
            sudo nohup dockerd --storage-driver vfs > /var/log/dockerd.log 2>&1 &
            timeout 60 bash -c 'until docker info &>/dev/null 2>&1; do sleep 1; done'
            sudo chmod 666 /var/run/docker.sock
          fi

      - name: Run smoke test
        uses: ./.github/actions/5_testintegration_agent-start/run-test
        with:
          platform: ${{ matrix.platform }}
          packages-path: ${{ matrix.packages-path }}
          ghcr-token: ${{ secrets.CI_WAZUH_AGENT_PACKAGES_CLASSIC }}
          actor: ${{ github.actor }}
