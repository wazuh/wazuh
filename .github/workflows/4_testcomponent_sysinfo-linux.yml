name: 4.X - Syscollector test on Ubuntu

on:
  workflow_dispatch:
  pull_request:
    paths:
        - ".github/workflows/4_testcomponent_sysinfo-linux.yml"
        - "src/data_provider/**"
        - "src/shared_modules/**"
        - "src/wazuh_modules/syscollector/**"
        - "src/Makefile"

jobs:
  build:
    runs-on: codebuild-github-actions-codebuild-runner-server-amd-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: "Install a compatible CMake"
        uses: ./.github/actions/reinstall_cmake
      # Build wazuh agent for linux.
      - name: Build wazuh agent for linux
        run: |
          make deps -C src TARGET=agent -j2
          make -C src build_syscollector TARGET=agent -j2
      - name: Install dependencies
        run: |
          pip install -r src/data_provider/qa/requirements.txt
      - name: Run tests
        run: |
          cd src/data_provider
          # TODO(codebuild-temp): Remove --ignore when CodeBuild runners expose full
          # hardware DMI data. test_hardware.py validates fields like serial number and
          # manufacturer that are empty strings in EC2 VMs, failing schema validation.
          python -m pytest -vv qa/ --ignore=qa/test_hardware.py
