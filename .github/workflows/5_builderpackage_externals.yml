run-name: External deps - ${{ inputs.legs || 'all 5 legs' }} ${{ inputs.dependencies && format('- {0}', inputs.dependencies) || '- (no version overrides)' }}
name: 5.X - Package - Build external dependencies

# Rebuilds Wazuh's external dependencies across one or more (system, architecture)
# legs. Each runner uploads a per-leg .tar.gz already laid out in the S3
# layout expected by `make deps` (libraries/<os>/<arch>/<dep>.tar.gz plus
# libraries/sources/<dep>.tar.gz). Downloading every artifact from a run and
# extracting each archive in turn into the same destination yields a complete
# libraries/ tree ready for upload to packages.wazuh.com/deps/<version>/.
#
# Covers all 5 supported legs:
#   - 2 Linux Docker legs:  rpm-amd64, rpm-arm64 (rpm is the oldest common
#                           denominator — its glibc is forward-compatible
#                           with deb, so we don't build deb separately)
#   - 2 macOS native legs:  macos-intel64, macos-arm64
#   - 1 Windows leg:        windows-i686 (MinGW cross-compile on a Linux
#                                         runner, no Docker)
# macOS and Windows are agent-only (no manager binaries exist for them).
#
# Each Linux leg always runs twice — once with the agent builder image and
# once with the manager builder image. The agent image is the oldest common
# denominator (centos:6 / wheezy era, glibc 2.12), so any binary produced
# there runs everywhere we ship; the manager image (centos:7, glibc 2.17)
# can build deps the agent image's older toolchain can't handle. For deps
# in the agent+manager intersection (the full agent set: flatbuffers,
# openssl, curl, ...) the agent-built `.tar.gz` lands in libraries/<os>/<arch>/;
# the manager leg is told to skip those binaries (see packages/generate_external.sh,
# DEDUPE_AGAINST_AGENT). For manager-exclusive deps (cpython, jemalloc,
# simdjson, ...) the manager leg's binaries are what ship. Sources are
# identical across legs.

on:
  workflow_dispatch:
    inputs:
      dependencies:
        description: |
          Semicolon-separated list of deps to update, in "name:version" form.
          Example: "curl:8.13.0;openssl:3.5.2".
          Empty = rebuild all deps from currently vendored sources without
          replacing any.
        type: string
        required: false
        default: ""
      legs:
        description: |
          Comma-separated list of <system>-<architecture> legs to run.
          Valid values: rpm-amd64, rpm-arm64, macos-intel64, macos-arm64,
          windows-i686.
          Empty = every supported leg. Each Linux leg fans out to both
          agent and manager builder images automatically. macOS and
          Windows are agent-only.
        type: string
        required: false
        default: ""
      docker_image_tag:
        description: |
          GHCR builder image tag. "auto" derives it from VERSION.json,
          "developer" uses the branch name. Otherwise a literal tag.
        type: string
        default: "auto"
        required: false

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Build matrix from inputs
        id: build
        run: |
          legs_input="${{ inputs.legs }}"

          # Always fan out to both agent and manager targets. Linux legs
          # run twice (agent image, then manager image); macOS/Windows only
          # have agent builder images so the manager pass is skipped for
          # those systems inside the loop.
          json='{"include":['
          first=true
          for tgt in agent manager; do
            if [ -z "${legs_input}" ]; then
              if [ "${tgt}" = "manager" ]; then
                tgt_legs="rpm-amd64,rpm-arm64"
              else
                tgt_legs="rpm-amd64,rpm-arm64,macos-intel64,macos-arm64,windows-i686"
              fi
            else
              tgt_legs="${legs_input}"
            fi

            for leg in $(echo "${tgt_legs}" | tr ',' ' '); do
              leg="$(echo "${leg}" | xargs)"  # trim whitespace
              system="${leg%-*}"
              architecture="${leg##*-}"
              case "${system}" in
                rpm|macos|windows) ;;
                *) echo "::error::unsupported system '${system}' in leg '${leg}' (valid: rpm, macos, windows)"; exit 1 ;;
              esac

              # macOS/Windows have no manager builder image. An explicit
              # legs list might include them — silently drop those combos
              # from the manager pass rather than failing the run.
              if [ "${tgt}" = "manager" ] && { [ "${system}" = "macos" ] || [ "${system}" = "windows" ]; }; then
                continue
              fi

              case "${system}-${architecture}" in
                rpm-amd64)           runner="wz-linux-amd64" ;;
                rpm-arm64)           runner="wz-linux-arm64" ;;
                macos-intel64)       runner="macos-14-large" ;;
                macos-arm64)         runner="macos-14" ;;
                windows-i686)        runner="wz-linux-amd64" ;;  # MinGW cross-compile on Linux
                *) echo "::error::unsupported leg '${leg}'"; exit 1 ;;
              esac
              ${first} || json="${json},"
              first=false
              json="${json}{\"system\":\"${system}\",\"architecture\":\"${architecture}\",\"runner\":\"${runner}\",\"leg\":\"${leg}\",\"target\":\"${tgt}\"}"
            done
          done
          json="${json}]}"
          echo "matrix=${json}" >> "${GITHUB_OUTPUT}"
          echo "Matrix: ${json}"

  build-externals:
    needs: prepare-matrix
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    name: Build externals (${{ matrix.leg }}-${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        if: matrix.system == 'rpm'
        run: |
          VERSION="$(grep '"version"' "${GITHUB_WORKSPACE}/VERSION.json" | sed -E 's/.*"version": *"([^"]+)".*/\1/')"
          if [ "${{ inputs.docker_image_tag }}" = "auto" ]; then
            echo "TAG=${VERSION}" >> "${GITHUB_ENV}"
          elif [ "${{ inputs.docker_image_tag }}" = "developer" ]; then
            echo "TAG=$(sed 's|[/\\]|--|g' <<< "${{ github.ref_name }}")" >> "${GITHUB_ENV}"
          else
            echo "TAG=${{ inputs.docker_image_tag }}" >> "${GITHUB_ENV}"
          fi
          echo "CONTAINER_NAME=pkg_${{ matrix.system }}_${{ matrix.target }}_builder_${{ matrix.architecture }}" >> "${GITHUB_ENV}"

      - name: Pull builder image from GHCR
        if: matrix.system == 'rpm'
        timeout-minutes: 20
        run: |
          bash "${GITHUB_WORKSPACE}/.github/actions/ghcr-pull-and-push/pull_image_from_ghcr.sh" \
            "${{ secrets.CI_WAZUH_AGENT_PACKAGES_CLASSIC }}" "${{ github.actor }}" "${CONTAINER_NAME}" "${TAG}"

      - name: Install build tools (macOS leg)
        if: matrix.system == 'macos'
        # gnu-tar provides `gtar`. The system /usr/bin/tar (BSD) rejects
        # --owner/--group/--no-same-owner, which we use to keep the packed
        # tarballs reproducible across runners.
        run: brew install bash automake gnu-tar

      - name: Install MinGW cross-compiler (windows leg)
        if: matrix.system == 'windows'
        run: |
          # Mirrors what 5_builderpackage_agent-windows.yml does: cross-compile
          # the Windows agent on a Linux runner using MinGW. The Wazuh CMake
          # external recipes detect IS_WINDOWS via CMAKE_SYSTEM_NAME (set by
          # TARGET=winagent) and switch to the i686-w64-mingw32-* toolchain.
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64 g++-mingw-w64 make

      - name: Build externals
        timeout-minutes: 60
        working-directory: packages
        run: |
          # nproc is Linux-only; macOS runners use sysctl. The scripts also
          # have this fallback internally, but compute JOBS here so it shows
          # in the workflow log for diagnosis.
          jobs="$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)"
          bash generate_external.sh \
            --system "${{ matrix.system }}" \
            --architecture "${{ matrix.architecture }}" \
            --target "${{ matrix.target }}" \
            --tag "${TAG:-}" \
            --dependencies "${{ inputs.dependencies }}" \
            --jobs "${jobs}" \
            --verbose

      - name: List produced artifacts
        if: always()
        run: |
          ls -lh packages/output_externals/externals-*.tar.gz 2>/dev/null || echo "no per-leg tarball produced"
          ls -la packages/output_externals/libraries/ 2>/dev/null || echo "no libraries/ tree"

      - name: Upload per-leg tarball
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: externals-${{ matrix.leg }}-${{ matrix.target }}
          path: packages/output_externals/externals-*.tar.gz
          if-no-files-found: error
          retention-days: 14

  consolidate:
    # Merge every per-leg tarball into a single libraries/ tree shaped
    # like the packages.wazuh.com/deps/<version>/ layout: sources/ holds
    # the union of upstream blobs (byte-identical across legs, so any
    # leg's copy works), linux/<arch>/ holds the agent-set binaries
    # (agent leg) plus manager-exclusive ones (manager leg), darwin/<arch>/
    # holds the macOS leg binaries, and windows/ holds the MinGW leg
    # binaries. Output is a single externals-all.tar.gz the user can
    # extract straight into S3.
    needs: build-externals
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download all per-leg tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: externals-*
          path: per-leg

      - name: Merge into single libraries/ tree
        run: |
          mkdir -p consolidated
          # Each per-leg artifact unzips into its own subdir with one
          # externals-<leg>-<target>.tar.gz inside. Extract them all into
          # the same consolidated/ root: manager-Linux legs already dropped
          # the agent-set binaries (see packages/generate_external.sh
          # DEDUPE_AGAINST_AGENT) so binary paths don't collide, and source
          # tarballs are byte-equivalent across legs.
          for tar in per-leg/*/externals-*.tar.gz; do
            echo "extracting ${tar}"
            tar -xzf "${tar}" -C consolidated/
          done
          echo "---"
          echo "consolidated libraries/ tree layout:"
          find consolidated/libraries -maxdepth 2 -type d | sort
          echo "---"
          echo "per-subtree dep counts:"
          for d in consolidated/libraries/*/ consolidated/libraries/*/*/; do
            n="$(find "${d}" -maxdepth 1 -name '*.tar.gz' | wc -l | xargs)"
            [ "${n}" -gt 0 ] && echo "  ${d}  ${n} tarballs"
          done

      - name: Pack consolidated tarball
        run: |
          tar -czf externals-all.tar.gz \
              --owner=0 --group=0 --no-same-owner \
              -C consolidated libraries
          ls -lh externals-all.tar.gz

      - name: Upload consolidated tarball
        uses: actions/upload-artifact@v4
        with:
          name: externals-all
          path: externals-all.tar.gz
          if-no-files-found: error
          retention-days: 14
