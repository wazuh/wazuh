run-name: External deps - Build ${{ inputs.system }} ${{ inputs.architecture }} ${{ inputs.target }} ${{ inputs.dependencies && format('- {0}', inputs.dependencies) || '- all (no version overrides)' }}
name: 5.X - Package - Build external dependencies (POC, deb-amd64-manager)

# Proof-of-concept scope: a single leg (deb-amd64-manager). Once this works
# end-to-end the matrix is extended to deb-arm64, rpm-{amd64,arm64},
# macos-{intel64,arm64}, windows.

on:
  workflow_dispatch:
    inputs:
      dependencies:
        description: |
          Semicolon-separated list of deps to update, in "name:version" form.
          Example: "curl:8.12.1;openssl:3.5.1".
          Leave empty to rebuild every dep from currently vendored sources
          (no version replacements).
        type: string
        required: false
        default: ""
      target:
        description: "Build set: 'agent' or 'manager'."
        type: choice
        options: [agent, manager]
        default: manager
        required: true
      system:
        description: "Builder image family (POC: only 'deb')."
        type: choice
        options: [deb]
        default: deb
        required: true
      architecture:
        description: "Architecture (POC: only 'amd64')."
        type: choice
        options: [amd64]
        default: amd64
        required: true
      docker_image_tag:
        description: |
          Tag of the GHCR builder image to pull. Use 'auto' to derive from
          VERSION.json, 'developer' to use the branch name.
        type: string
        default: "auto"
        required: false

jobs:
  build-externals:
    permissions:
      contents: read
      packages: write
    runs-on: ${{ inputs.architecture == 'arm64' && 'wz-linux-arm64' || 'wz-linux-amd64' }}
    timeout-minutes: 90
    name: External deps - ${{ inputs.system }}-${{ inputs.architecture }}-${{ inputs.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        run: |
          VERSION="$(grep '"version"' "${GITHUB_WORKSPACE}/VERSION.json" | sed -E 's/.*"version": *"([^"]+)".*/\1/')"
          if [ "${{ inputs.docker_image_tag }}" = "auto" ]; then
            echo "TAG=${VERSION}" >> "${GITHUB_ENV}"
          elif [ "${{ inputs.docker_image_tag }}" = "developer" ]; then
            echo "TAG=$(sed 's|[/\\]|--|g' <<< "${{ github.ref_name }}")" >> "${GITHUB_ENV}"
          else
            echo "TAG=${{ inputs.docker_image_tag }}" >> "${GITHUB_ENV}"
          fi
          echo "CONTAINER_NAME=pkg_${{ inputs.system }}_${{ inputs.target }}_builder_${{ inputs.architecture }}" >> "${GITHUB_ENV}"

      - name: Pull builder image from GHCR
        timeout-minutes: 20
        run: |
          bash "${GITHUB_WORKSPACE}/.github/actions/ghcr-pull-and-push/pull_image_from_ghcr.sh" \
            "${{ secrets.GITHUB_TOKEN }}" "${{ github.actor }}" "${CONTAINER_NAME}" "${TAG}"

      - name: Build externals
        timeout-minutes: 60
        working-directory: packages
        run: |
          bash generate_external.sh \
            --system "${{ inputs.system }}" \
            --architecture "${{ inputs.architecture }}" \
            --target "${{ inputs.target }}" \
            --tag "${TAG}" \
            --dependencies "${{ inputs.dependencies }}" \
            --jobs "$(nproc)" \
            --verbose

      - name: List produced artifacts
        if: always()
        run: |
          ls -la packages/output_externals/external_artifacts/ 2>/dev/null || echo "no artifacts produced"

      - name: Upload per-dep zips
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Single GitHub artifact containing all per-dep zips. The user
          # downloads it and extracts the individual <dep>_src.zip and
          # <dep>_<system>_<arch>.zip files. If we ever want each dep as its
          # own GitHub artifact, this needs a fan-out (matrix or per-name
          # upload step) — defer until needed.
          name: externals-${{ inputs.system }}-${{ inputs.architecture }}-${{ inputs.target }}
          path: packages/output_externals/external_artifacts/*.zip
          if-no-files-found: error
          retention-days: 14
