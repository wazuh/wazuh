run-name: External deps - ${{ inputs.target }} ${{ inputs.legs || 'all linux legs' }} ${{ inputs.dependencies && format('- {0}', inputs.dependencies) || '- (no version overrides)' }}
name: 5.X - Package - Build external dependencies

# Rebuilds Wazuh's external dependencies across one or more (system, architecture)
# legs and uploads per-dep zips (source-only and source+binaries) as artifacts.
#
# Phase 1 covers the 4 Linux Docker legs (deb/rpm x amd64/arm64). macOS and
# Windows legs are added in follow-up commits — they need separate build
# paths (native + MinGW respectively) that this workflow doesn't yet wire up.

on:
  workflow_dispatch:
    inputs:
      dependencies:
        description: |
          Semicolon-separated list of deps to update, in "name:version" form.
          Example: "curl:8.13.0;openssl:3.5.2".
          Empty = rebuild all deps from currently vendored sources without
          replacing any.
        type: string
        required: false
        default: ""
      target:
        description: "Build set: 'agent' (28 deps) or 'manager' (47 deps, includes the agent set)."
        type: choice
        options: [agent, manager]
        default: manager
        required: true
      legs:
        description: |
          Comma-separated list of <system>-<architecture> legs to run.
          Valid values: deb-amd64, deb-arm64, rpm-amd64, rpm-arm64.
          Empty = run all four Linux legs.
        type: string
        required: false
        default: ""
      docker_image_tag:
        description: |
          GHCR builder image tag. "auto" derives it from VERSION.json,
          "developer" uses the branch name. Otherwise a literal tag.
        type: string
        default: "auto"
        required: false

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Build matrix from inputs
        id: build
        run: |
          legs_input="${{ inputs.legs }}"
          if [ -z "${legs_input}" ]; then
            legs_input="deb-amd64,deb-arm64,rpm-amd64,rpm-arm64"
          fi

          json='{"include":['
          first=true
          IFS=','
          for leg in ${legs_input}; do
            leg="$(echo "${leg}" | xargs)"  # trim whitespace
            system="${leg%-*}"
            architecture="${leg##*-}"
            case "${system}" in
              deb|rpm) ;;
              *) echo "::error::unsupported system '${system}' in leg '${leg}' (valid: deb, rpm)"; exit 1 ;;
            esac
            case "${architecture}" in
              amd64) runner="wz-linux-amd64" ;;
              arm64) runner="wz-linux-arm64" ;;
              *) echo "::error::unsupported architecture '${architecture}' in leg '${leg}' (valid: amd64, arm64)"; exit 1 ;;
            esac
            ${first} || json="${json},"
            first=false
            json="${json}{\"system\":\"${system}\",\"architecture\":\"${architecture}\",\"runner\":\"${runner}\",\"leg\":\"${leg}\"}"
          done
          json="${json}]}"
          echo "matrix=${json}" >> "${GITHUB_OUTPUT}"
          echo "Matrix: ${json}"

  build-externals:
    needs: prepare-matrix
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    name: Build externals (${{ matrix.leg }}-${{ inputs.target }})

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        run: |
          VERSION="$(grep '"version"' "${GITHUB_WORKSPACE}/VERSION.json" | sed -E 's/.*"version": *"([^"]+)".*/\1/')"
          if [ "${{ inputs.docker_image_tag }}" = "auto" ]; then
            echo "TAG=${VERSION}" >> "${GITHUB_ENV}"
          elif [ "${{ inputs.docker_image_tag }}" = "developer" ]; then
            echo "TAG=$(sed 's|[/\\]|--|g' <<< "${{ github.ref_name }}")" >> "${GITHUB_ENV}"
          else
            echo "TAG=${{ inputs.docker_image_tag }}" >> "${GITHUB_ENV}"
          fi
          echo "CONTAINER_NAME=pkg_${{ matrix.system }}_${{ inputs.target }}_builder_${{ matrix.architecture }}" >> "${GITHUB_ENV}"

      - name: Pull builder image from GHCR
        timeout-minutes: 20
        run: |
          bash "${GITHUB_WORKSPACE}/.github/actions/ghcr-pull-and-push/pull_image_from_ghcr.sh" \
            "${{ secrets.GITHUB_TOKEN }}" "${{ github.actor }}" "${CONTAINER_NAME}" "${TAG}"

      - name: Build externals
        timeout-minutes: 60
        working-directory: packages
        run: |
          bash generate_external.sh \
            --system "${{ matrix.system }}" \
            --architecture "${{ matrix.architecture }}" \
            --target "${{ inputs.target }}" \
            --tag "${TAG}" \
            --dependencies "${{ inputs.dependencies }}" \
            --jobs "$(nproc)" \
            --verbose

      - name: List produced artifacts
        if: always()
        run: |
          ls -la packages/output_externals/external_artifacts/ 2>/dev/null || echo "no artifacts produced"

      - name: Upload per-dep zips
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: externals-${{ matrix.leg }}-${{ inputs.target }}
          path: packages/output_externals/external_artifacts/*.zip
          if-no-files-found: error
          retention-days: 14
