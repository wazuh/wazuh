name: 5.X - Shared Modules - Utils - Unit tests

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - ".github/workflows/5_testunit_shared_modules_utils.yml"
      - "src/shared_modules/utils/**"
      - ".github/actions/build_external_deps/**"
      - ".github/actions/build_target_cpp/**"
      - ".github/actions/coverage_cpp/**"
      - ".github/actions/test_cpp/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  shared_modules_utils-modules:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Cancel previous runs
        uses: fkirc/skip-duplicate-actions@master
        with:
          cancel_others: 'true'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_after_successful_duplicate: 'false'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Project dependencies
        uses: ./.github/actions/build_external_deps

      - name: Shared modules utils - Build tests
        uses: ./.github/actions/build_target_cpp
        with:
          target: "utils_utest"
          test: "true"
          asan: "false"

      - name: Shared modules utils - Run tests
        uses: ./.github/actions/test_cpp
        with:
          valgrind: "true"
          target: "utils_utest"

      - name: Shared modules utils - Coverage
        uses: ./.github/actions/coverage_cpp
        with:
          path: src/shared_modules/utils
          id: utils_utest
          validate_function_coverage: "false"

  shared_modules_utils-asan:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Project dependencies
        uses: ./.github/actions/build_external_deps

      - name: Shared modules utils - Build tests
        uses: ./.github/actions/build_target_cpp
        with:
          target: "utils_utest"
          test: "true"
          asan: "true"

      - name: Shared modules utils - Run tests
        uses: ./.github/actions/test_cpp
        with:
          target: "utils_utest"
          valgrind: "false"
