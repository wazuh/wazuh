name: 5.X - Execd on Linux - Integration tests - Tier 0 and 1

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Base branch"
        required: true
        default: "main"
  pull_request:
    paths:
      - ".github/workflows/5_testintegration_execd-tier-0-1-lin.yml"
      - "src/config/src/active-response.c"
      - "src/config/include/active-response.h"
      - "src/execd/**"
      - "src/Makefile"
      - "tests/integration/conftest.py"
      - "tests/integration/test_execd/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      BRANCH_BASE: ${{ github.base_ref || inputs.base_branch }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version-file: ".github/workflows/.python-version-it"
          architecture: x64
      - name: Install a compatible CMake
        uses: ./.github/actions/reinstall_cmake
      - name: Build wazuh agent
        uses: ./.github/actions/build_wazuh
        with:
          target: agent
      - name: Install wazuh agent for linux
        uses: ./.github/actions/install_wazuh_agent
      - name: Install QA integration framework
        uses: ./.github/actions/install_qa_framework
        with:
          branch_name: ${{ env.BRANCH_NAME }}
          branch_base: ${{ env.BRANCH_BASE }}
      - name: Run execd integration tests
        run: |
          cd tests/integration
          sudo GITHUB_SHA="${{ github.sha }}" GITHUB_REF_NAME="${{ env.BRANCH_NAME }}" python -m pytest --tier 0 --tier 1 test_execd/ --html=results.html --self-contained-html
      - name: Dump wazuh-agent logs on failure
        if: failure()
        run: |
          sudo journalctl -xeu wazuh-agent.service || true
          sudo tail -n 200 /var/ossec/logs/ossec.log || true
      - name: Upload failed test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: execd-tier-0-1-lin-test-results-${{ github.run_id }}
          path: ./tests/integration/results.html
          retention-days: 7
