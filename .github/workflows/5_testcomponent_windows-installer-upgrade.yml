name: 5.X - Windows upgrade test

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - "src/**"
      - ".github/workflows/5_testcomponent_windows-installer-upgrade.yml"
      - ".github/actions/reinstall_cmake/**"
      - "!src/engine/**"
      - "!src/remoted/**"
      - "!src/util/**"
      - "!src/shared_modules/indexer_connector/**"
      - "!src/shared_modules/keystore/**"
      # Only src/ for these server trees: agent modules compile against their include/
      - "!src/monitord/src/**"
      - "!src/os_auth/src/**"
      - "!src/wazuh_db/src/**"
      - "!src/wazuh_db/schemas/**"
      - "!src/shared_modules/content_manager/src/**"
      - "!src/shared_modules/router/src/**"
      - "!src/wazuh_modules/vulnerability_scanner/src/**"
      - "!src/wazuh_modules/inventory_sync/src/**"
      # Test trees: UNIT_TEST-gated, never built by this workflow
      - "!src/unit_tests/**"
      - "!src/**/tests/**"
      - "!src/**/integrationTests/**"
      # qa/ suites run in other workflows; win32/qa stays (executed here)
      - "!src/data_provider/qa/**"
      - "!src/shared_modules/indexer_connector/qa/**"
      - "!src/shared_modules/keystore/qa/**"
      - "!src/wazuh_modules/inventory_sync/qa/**"
      - "!src/wazuh_modules/vulnerability_scanner/qa/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: codebuild-github-actions-codebuild-runner-server-amd-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 30
    steps:
      - name: Install mingw
        run: |
          sudo apt-get update
          sudo apt install gcc-mingw-w64 g++-mingw-w64-i686 g++-mingw-w64-x86-64 make -y
      - uses: actions/checkout@v3
      - name: "Install a compatible CMake"
        uses: ./.github/actions/reinstall_cmake
      - name: make deps
        run: make -C src deps TARGET=winagent -j2
      - name: make
        run: make -C src TARGET=winagent -j2
      - name: Avoid signing files and pause
        run: |
          sed -i 's+signtool+::signtool+g' src/win32/wazuh-installer-build-msi.bat
          sed -i 's+pause+::pause+g' src/win32/wazuh-installer-build-msi.bat
      - name: Removing not required files
        run: rm -rf src/external/* .git/
      - name: Compress folder
        run: 7z a win-agent-base.zip ./*
      - name: Upload base branch folder
        uses: actions/upload-artifact@v4
        with:
          name: win-agent-base.zip
          path: win-agent-base.zip

  check_upgrade_result:
    strategy:
          matrix:
              wazuh_version: [4.14.0-1]
    runs-on:
      - codebuild-github-actions-codebuild-runner-agent-windows-amd-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 30
    needs: build
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version-file: ".github/workflows/.python-version"
          architecture: x64
      - name: Set up WiX Toolset (MSI build)
        # TODO(codebuild-temp): Remove once the CodeBuild Windows image ships the WiX Toolset.
        # wazuh-installer-build-msi.bat builds the MSI with candle.exe/light.exe (WiX v3).
        # GitHub-hosted images bundled WiX (exposed via $WIX); the CodeBuild image does not.
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Command candle.exe -ErrorAction SilentlyContinue) {
            Write-Host "WiX already available: $((Get-Command candle.exe).Source)"
          } elseif ($env:WIX -and (Test-Path (Join-Path $env:WIX 'bin\candle.exe'))) {
            Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $env:WIX 'bin')
            Write-Host "WiX found via `$WIX: $env:WIX"
          } else {
            $wixZip = Join-Path $env:TEMP 'wix314-binaries.zip'
            Invoke-WebRequest -Uri 'https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip' -OutFile $wixZip
            $wixDir = 'C:\wix314'
            Expand-Archive -Path $wixZip -DestinationPath $wixDir -Force
            Add-Content -Path $env:GITHUB_PATH -Value $wixDir
            Write-Host "WiX extracted to $wixDir"
          }
      - name: Install dependencies
        run: |
          pip install -r src/win32/qa/requirements.txt
      - name: Download released .msi
        run: |
          mkdir C:\win-agent-released
          python -m wget https://packages.wazuh.com/4.x/windows/wazuh-agent-${{ matrix.wazuh_version }}.msi -o C:\win-agent-released
      - name: Download base folder
        uses: actions/download-artifact@v4
        with:
          name: win-agent-base.zip
          path: C:\win-agent-base
      - name: Unzip base folder
        # The CodeBuild Windows image has no 7-Zip on PATH (GitHub-hosted images did). Use the
        # native tar.exe (fast, ships with Server 2019+) and fall back to Expand-Archive; the
        # archive is a standard .zip produced by `7z a`, so both extract it.
        shell: pwsh
        run: |
          $zip = "C:\win-agent-base\win-agent-base.zip"
          $dest = "C:\win-agent-base"
          if (Get-Command tar.exe -ErrorAction SilentlyContinue) {
            tar -xf $zip -C $dest
          } else {
            Expand-Archive -Path $zip -DestinationPath $dest -Force
          }
      - name: Create .msi package
        run: |
          cd C:\win-agent-base\src\win32
          $VERSION_FILE = "..\..\VERSION.json"
          if (Test-Path $VERSION_FILE) {
              $json = Get-Content $VERSION_FILE | ConvertFrom-Json
              $VERSION = $json.version
          } else {
              Write-Host "Error: VERSION.json not found."
              exit 1
          }
          .\wazuh-installer-build-msi.bat $VERSION 0
          cp *.msi C:\win-agent-base\
      - name: Run tests
        run: |
          cd src/win32/qa
          python -m pytest -vv ./test_win_upgrade.py
      - name: Upload release installation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release_log
          path: C:\win-agent-released\win-agent-released.log
      - name: Upload base installation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: base_log
          path: C:\win-agent-base\win-agent-base.log
