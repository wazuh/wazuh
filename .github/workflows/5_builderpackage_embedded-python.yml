name: 5.X - Package - Build Wazuh manager embedded Python

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Comma-separated architecture. Example: "amd64,arm64"'
        type: string
        default: "amd64,arm64"
        required: true
      build_cpython:
        description: Whether to build embedded Python or not.
        type: boolean
        default: true
        required: false
      build_deps:
        description: Whether to build embedded Python dependencies or not. Enabling build_cpython will enable this option automatically.
        type: boolean
        default: true
        required: false

jobs:
  pick-architecture:
    name: Get architectures
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate dynamic matrix
        id: set-matrix
        run: |
          set -euo pipefail
          JSON_ARRAY=$(
            echo "${{ inputs.architecture }}" | tr ',' '\n' | while read -r raw_arch; do
              arch=$(echo "$raw_arch" | xargs)
              case "$arch" in
                arm64|aarch64) IMG_ARCH="arm64" ;;
                amd64|x86_64) IMG_ARCH="amd64" ;;
                "") continue ;;
                *) echo "Unsupported architecture: $arch" >&2; exit 1 ;;
              esac
              jq -c -n --arg arch "$IMG_ARCH" '{architecture: $arch}'
            done
          )
          JSON_ARRAY=$(echo "$JSON_ARRAY" | jq -c -s 'unique | {include: .}')
          echo "matrix=$JSON_ARRAY" >> "$GITHUB_OUTPUT"

  build-python:
    name: Build embedded Python (${{ matrix.architecture }})
    needs: pick-architecture
    strategy:
      matrix: ${{ fromJSON(needs.pick-architecture.outputs.matrix) }}
      fail-fast: false
    runs-on: ${{ matrix.architecture == 'arm64' && 'wz-linux-arm64' || 'ubuntu-24.04' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set environment variables
        run: |
          arch="${{ matrix.architecture }}"
          if [ "$arch" = "amd64" ]; then
            pkg_arch="x86_64"
          else
            pkg_arch="arm64"
          fi

          VERSION=$(jq -r '.version' VERSION.json)

          cat << EOF | sed -e 's/^[[:space:]]*//' -e 's/\r$//' >> $GITHUB_ENV
          ARCH=$arch
          PACKAGE_ARCH=$pkg_arch
          TAG=$VERSION
          CONTAINER_NAME=pkg_rpm_manager_builder_$arch
          EOF

      - name: Pull builder container image
        run: |
          bash .github/actions/ghcr-pull-and-push/pull_image_from_ghcr.sh ${{ secrets.GITHUB_TOKEN }} ${{ github.actor }} ${{ env.CONTAINER_NAME }} ${{ env.TAG }}

      - name: Compile embedded Python
        working-directory: framework/cpython
        run: |
          docker run --env ARCH="${{ env.PACKAGE_ARCH }}" \
            -v $GITHUB_WORKSPACE:/wazuh_host -v /tmp:/output \
            --entrypoint=bash ${{ env.CONTAINER_NAME }}:${{ env.TAG }} \
            /wazuh_host/framework/cpython/compile.sh \
              ${{ inputs.build_cpython == true && '--build-cpython' || '' }} \
              ${{ inputs.build_deps == true && '--build-deps' || '' }}

      - name: Upload sources
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCH }}-sources
          path: /tmp/cpython_${{ env.PACKAGE_ARCH }}.tar.gz
          if-no-files-found: error

      - name: Upload compiled Python
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCH }}-compiled
          path: /tmp/cpython.tar.gz
          if-no-files-found: error
