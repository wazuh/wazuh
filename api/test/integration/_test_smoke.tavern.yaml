test_name: POST /security/user/authenticate

stages:

  - name: Get an API token in raw format
    request:
      verify: False
      url: "{protocol:s}://{host:s}:{balanced_port:d}/security/user/authenticate"
      headers:
        Authorization: "Basic {basic_auth:s}"
      params:
        raw: True
      method: POST
    response:
      status_code: 200
      verify_response_with:
        - function: tavern_utils:test_token_raw_format
      save:
        $ext:
          function: tavern_utils:test_save_token_raw_format

  - name: Test generated token
    request:
      verify: False
      url: "{protocol:s}://{host:s}:{balanced_port:d}/"
      headers:
        Authorization: "Bearer {login_token}"
      method: GET
    response:
      status_code: 200
