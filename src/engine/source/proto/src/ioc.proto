syntax = "proto3";

import "engine.proto";

package com.wazuh.api.engine.ioc;

/***************************************************
 * Query the IOC manager for a specific indicator
 *
 * endpoint: POST /content/ioc/update
 *
 * Performs an update of the IOCs in the manager using the provided file path and hash.
 * The file should be in nd-json format, where each line is a JSON object representing an IOC.
 * The hash is used to skip the update if the file has not changed since the last update, improving efficiency.
 **************************************************/
message UpdateIoc_Request
{
    string path = 1; ///< Path to the file containing the IOCs to update (nd-json format)
    string hash = 2; ///< MD5 hash of the file to update
}

// message UpdateIoc_Response -> Return a GenericStatus_Response
