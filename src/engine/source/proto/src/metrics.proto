syntax = "proto3";

import "engine.proto";

package com.wazuh.api.engine.metrics;

/*
 * Fast metrics API - Lock-free metrics management
 * Provides enable/disable, get, list, and dump operations
 */

/***************************************************
 * Enable or disable a specific metric
 *
 * command: metrics/enable (<resource>/<action>)
 **************************************************/
message Enable_Request
{
    optional string instrumentName = 1; // Metric name (e.g., "router.events.processed")
    optional bool status = 2;           // true = enable, false = disable (default: true)
}

message Enable_Response
{
    ReturnStatus status = 1;     // Status of the operation
    optional string error = 2;   // Error message if status is ERROR
    optional string content = 3; // Success message if status is OK
}

/***************************************************
 * Get a single metric information
 *
 * command: metrics/get (<resource>/<action>)
 **************************************************/
message Get_Request
{
    optional string instrumentName = 1; // Metric name
}

message Get_Response
{
    ReturnStatus status = 1;   // Status of the query
    optional string error = 2; // Error message if status is ERROR
    optional string name = 3;  // Metric name
    optional int32 type = 4;   // Metric type (0=COUNTER, 1=GAUGE_INT, 2=GAUGE_DBL, 3=HISTOGRAM)
    optional bool enabled = 5; // Whether metric is enabled
    optional double value = 6; // Current metric value
}

/***************************************************
 * List all registered metrics names
 *
 * command: metrics/list (<resource>/<action>)
 **************************************************/
message List_Request
{
    // Empty request
}

message List_Response
{
    ReturnStatus status = 1;   // Status of the query
    optional string error = 2; // Error message if status is ERROR
    repeated string names = 3; // List of all metric names
}

/***************************************************
 * Dump all metrics with their values
 *
 * command: metrics/dump (<resource>/<action>)
 **************************************************/
message Dump_Request
{
    // Empty request
}

message MetricEntry
{
    optional string name = 1;  // Metric name
    optional int32 type = 2;   // Metric type (0=COUNTER, 1=GAUGE_INT, 2=GAUGE_DBL, 3=HISTOGRAM)
    optional bool enabled = 3; // Whether metric is enabled
    optional double value = 4; // Current metric value
}

message Dump_Response
{
    ReturnStatus status = 1;          // Status of the query
    optional string error = 2;        // Error message if status is ERROR
    repeated MetricEntry entries = 3; // All metrics with their values
}
