[metadata]
name = engine-metrics
version = 1.0.0.dev0
author = "Wazuh Inc."
description = "Real-time metrics dashboard and CLI tools for Wazuh Engine"
long_description = file: README.md
license = BSD-3-Clause

[options]
packages = find:
package_dir =
    = src
include_package_data = True
python_requires = >=3.8

install_requires =
    flask==3.0.0
    flask-socketio==5.3.5
    python-socketio[client]==5.10.0
    api-communication

[options.packages.find]
where = src

[options.package_data]
engine_metrics =
    templates/*.html

[options.entry_points]
console_scripts =
    engine-metrics = engine_metrics.__main__:main

[options.extras_require]
dev =
    autopep8
