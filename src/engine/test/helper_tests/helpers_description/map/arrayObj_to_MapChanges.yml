# Name of the helper function
name: array_obj_to_map_changes

metadata:
  description: |
    Builds a map of changes from an array of objects. Each element provides the key
    (via a JSON pointer) and both the new and old values (as JSON pointers, `/` for the full object).
    Keys are normalized to lowercase snake_case unless `skipSerializer` is true, in which
    case keys are kept verbatim. Entries missing a key or new value, or producing an empty key, are skipped.
    Old values that resolve to empty strings are omitted from the result.
    The helper returns an error when no entries are inserted.
  keywords:
    - array
    - map
    - changes

helper_type: map

skipped:
  - success_cases

is_variadic: false

arguments:
  source_array:
    type: array
    source: reference
  key_pointer:
    type: string
    source: value
  new_value_pointer:
    type: string
    source: value
  old_value_pointer:
    type: string
    source: value
  skip_serializer:
    type: boolean
    source: value
    optional: true

output:
  type: object

test:
  - arguments:
      source_array:
        source: reference
        value:
          - Name: RequiredResourceAccess
            NewValue: new-data
            OldValue: old-data
          - Name: Included Updated Properties
            NewValue: RequiredResourceAccess
            OldValue: ""
      key_pointer:
        source: value
        value: "/Name"
      new_value_pointer:
        source: value
        value: "/NewValue"
      old_value_pointer:
        source: value
        value: "/OldValue"
      skip_serializer:
        source: value
        value: false
    should_pass: true
    expected:
      requiredresourceaccess:
        NewValue: new-data
        OldValue: old-data
      included_updated_properties:
        NewValue: RequiredResourceAccess
    description: Builds map with normalized keys and both new/old values
    context: |
      {
        "ModifiedProperties": [
          {"Name": "RequiredResourceAccess", "NewValue": "new-data", "OldValue": "old-data"},
          {"Name": "Included Updated Properties", "NewValue": "RequiredResourceAccess", "OldValue": ""}
        ]
      }

  - arguments:
      source_array:
        source: reference
        value:
          - Name: RequiredResourceAccess
            NewValue: new-data
            OldValue: old-data
          - Name: Included Updated Properties
            NewValue: RequiredResourceAccess
            OldValue: ""
      key_pointer:
        source: value
        value: "/Name"
      new_value_pointer:
        source: value
        value: "/NewValue"
      old_value_pointer:
        source: value
        value: "/OldValue"
      skip_serializer:
        source: value
        value: true
    should_pass: true
    expected:
      RequiredResourceAccess:
        NewValue: new-data
        OldValue: old-data
      Included Updated Properties:
        NewValue: RequiredResourceAccess
    description: Keeps keys verbatim when `skipSerializer` is true
    context: |
      {
        "ModifiedProperties": [
          {"Name": "RequiredResourceAccess", "NewValue": "new-data", "OldValue": "old-data"},
          {"Name": "Included Updated Properties", "NewValue": "RequiredResourceAccess", "OldValue": ""}
        ]
      }

  - arguments:
      source_array:
        source: reference
        value:
          - Name: RequiredResourceAccess
            NewValue: new-data
      key_pointer:
        source: value
        value: "/Name"
      new_value_pointer:
        source: value
        value: "/NewValue"
      old_value_pointer:
        source: value
        value: "/OldValue"
      skip_serializer:
        source: value
        value: false
    should_pass: true
    expected:
      requiredresourceaccess:
        NewValue: new-data
    description: Skips missing old values but keeps available new ones
    context: |
      {
        "ModifiedProperties": [
          {"Name": "RequiredResourceAccess", "NewValue": "new-data"}
        ]
      }

  - arguments:
      source_array:
        source: reference
        value:
          - Name: FeatureFlag
            NewValue: true
            OldValue: "   "
      key_pointer:
        source: value
        value: "/Name"
      new_value_pointer:
        source: value
        value: "/NewValue"
      old_value_pointer:
        source: value
        value: "/OldValue"
      skip_serializer:
        source: value
        value: false
    should_pass: true
    expected:
      featureflag:
        NewValue: true
    description: Treats whitespace-only old values as missing
    context: |
      {
        "ModifiedProperties": [
          {"Name": "FeatureFlag", "NewValue": true, "OldValue": "   "}
        ]
      }

  - arguments:
      source_array:
        source: reference
        value:
          - Name: RequiredResourceAccess
            OldValue: old-data
      key_pointer:
        source: value
        value: "/Name"
      new_value_pointer:
        source: value
        value: "/NewValue"
      old_value_pointer:
        source: value
        value: "/OldValue"
      skip_serializer:
        source: value
        value: false
    should_pass: false
    description: Fails when new value is missing
    context: |
      {
        "ModifiedProperties": [
          {"Name": "RequiredResourceAccess", "OldValue": "old-data"}
        ]
      }

  - arguments:
      source_array: "$.Missing"
      key_pointer:
        source: value
        value: "/Name"
      new_value_pointer:
        source: value
        value: "/NewValue"
      old_value_pointer:
        source: value
        value: "/OldValue"
      skip_serializer:
        source: value
        value: false
    should_pass: false
    description: Fails when array does not exist in the context
    context: |
      {}
