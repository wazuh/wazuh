# Name of the helper function
name: date_to_epoch

metadata:
  description: |
    Converts a date/time string to its UNIX epoch (seconds since 1970-01-01T00:00:00Z), returned as a double.
    Parsing is strict and driven entirely by a format pattern:
      - If a second argument `pattern` is provided (string literal), it is used verbatim by the parser.
      - If `pattern` is omitted, the default pattern "%Y-%m-%dT%H:%M:%SZ" (ISO 8601, UTC with trailing 'Z') is used.
    To support other ISO-8601 variants (offsets, basic format, space instead of 'T', etc.), pass the appropriate pattern.
  keywords:
    - date
    - time
    - epoch
    - timestamp

helper_type: map

# Arguments expected by the helper function
arguments:
  date:
    type: string
    generate: string
    source: reference
  pattern:
    type: string
    generate: string
    source: value

skipped:
  - success_cases

# Indicates whether the helper function supports a variable number of arguments
is_variadic: False

output:
  type: double
  subset: double

test:
  - arguments:
      date: "1970-01-01T00:00:00Z"
      pattern: "%Y-%m-%dT%H:%M:%SZ"
    should_pass: true
    expected: 0.0
    description: Default pattern → epoch start
  - arguments:
      date: "2024-05-17T15:10:58Z"
      pattern: "%Y-%m-%dT%H:%M:%SZ"
    should_pass: true
    expected: 1715958658.0
    description: Default pattern → UTC with trailing Z
  - arguments:
      date: "2024-09-24T23:03:00.597629Z"
      pattern: "%Y-%m-%dT%H:%M:%SZ"
    should_pass: true
    expected: 1727218980.597629
    description: Default pattern → fractional seconds preserved
  - arguments:
      date: "1969-12-31T23:59:59Z"
      pattern: "%Y-%m-%dT%H:%M:%SZ"
    should_pass: true
    expected: -1.0
    description: Default pattern → negative epoch
  - arguments:
      date: "2024-05-17T15:10:58"
      pattern: "%Y-%m-%dT%H:%M:%SZ"
    should_pass: false
    description: Default pattern requires 'Z' → fails without timezone
  - arguments:
      date: "2024-05-17T12:10:58-03:00"
      pattern: "%FT%T%Ez"
    should_pass: true
    expected: 1715958658.0
    description: Offset with colon (−03:00)
  - arguments:
      date: "2024-05-17T12:10:58-0300"
      pattern: "%FT%T%z"
    should_pass: true
    expected: 1715958658.0
    description: Offset without colon (−0300)
  - arguments:
      date: "2024-05-17 15:10:58+00:00"
      pattern: "%F %T%Ez"
    should_pass: true
    expected: 1715958658.0
    description: Space instead of 'T' + offset
  - arguments:
      date: "20240517T151058Z"
      pattern: "%Y%m%dT%H%M%SZ"
    should_pass: true
    expected: 1715958658.0
    description: Basic (no-extended) format with 'Z'
  - arguments:
      date: "20240517T121058-0300"
      pattern: "%Y%m%dT%H%M%S%z"
    should_pass: true
    expected: 1715958658.0
    description: Basic format with offset (−0300)
  - arguments:
      date: "2024-05-17T15:10:58"
      pattern: "%FT%T"
    should_pass: true
    expected: 1715958658.0
    description: No timezone in input; pattern without timezone
  - arguments:
      date: 123456789
      pattern: "%Y-%m-%dT%H:%M:%SZ"
    should_pass: false
    description: Reject non-string input for 'date'
  - arguments:
      date: null
      pattern: "%Y-%m-%dT%H:%M:%SZ"
    should_pass: false
    description: Reject null input for 'date'
