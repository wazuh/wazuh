policy:
  id: "cis_lin_compliance_valid_keys"
  file: "cis_lin_compliance_valid_keys.yaml"
  name: "Test Compliance Valid Keys Policy"
  description: "Test policy to validate the new compliance flat-object format with only allowed keys"
  references:
    - https://www.cisecurity.org/cis-benchmarks/
  regex_type: pcre2

requirements:
  title: "Check Linux platform."
  description: "Requirements for running the SCA scan against Linux systems"
  condition: any
  rules:
    - "f:/proc/sys/kernel/ostype -> Linux"

checks:
  - id: 99001
    title: "Test check with valid compliance keys only"
    description: "This check uses only allowed compliance keys in the new flat object format."
    rationale: "Validates that valid compliance keys are accepted."
    remediation: "No remediation needed."
    compliance:
      pci_dss: ["2.2.4", "6.2"]
      nist_800_53: ["CM.1"]
      gdpr: ["32"]
    condition: any
    rules:
      - "f:/etc/os-release"

  - id: 99002
    title: "Test check with all 10 valid compliance keys"
    description: "This check uses all 10 allowed compliance framework keys."
    rationale: "Validates that all allowed keys are accepted."
    remediation: "No remediation needed."
    compliance:
      cmmc: ["L2-3.4.7"]
      fedramp: ["AC-1"]
      gdpr: ["32"]
      hipaa: ["164.312"]
      iso_27001: ["A.13.1.3"]
      nis2: ["21.2"]
      nist_800_171: ["3.4.7"]
      nist_800_53: ["CM.1"]
      pci_dss: ["2.2.4"]
      tsc: ["CC6.1"]
    condition: any
    rules:
      - "f:/etc/passwd"
