policy:
  id: "cis_lin_compliance_invalid_keys"
  file: "cis_lin_compliance_invalid_keys.yaml"
  name: "Test Compliance Invalid Keys Policy"
  description: "Test policy to validate that invalid compliance keys are rejected with warnings"
  references:
    - https://www.cisecurity.org/cis-benchmarks/
  regex_type: pcre2

requirements:
  title: "Check Linux platform."
  description: "Requirements for running the SCA scan against Linux systems"
  condition: any
  rules:
    - "f:/proc/sys/kernel/ostype -> Linux"

checks:

  - id: 99010
    title: "Test check with mixed valid and invalid compliance keys"
    description: "This check includes both valid and invalid compliance keys."
    rationale: "Validates that invalid keys are rejected with a warning while valid keys are kept."
    remediation: "No remediation needed."
    compliance:
      pci_dss: ["5.2.1"]
      nist_800_53: ["14.6"]
      iso_27001: ["A.13.1.3"]
      cis: ["1.7.5"]
      cis_csc_v8: ["5.1"]
      pci_dss_v3.2.1: ["10.2.5"]
      soc_2: ["CC6.1"]
    condition: any
    rules:
      - "f:/etc/passwd"
