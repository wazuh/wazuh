- sections:
    - section: syscheck
      elements:
        - disabled:
            value: "no"
        - frequency:
            value: FREQUENCY
        - directories:
            value: TEST_DIR
            attributes:
              - FIM_MODE
        - file_limit: FILE_LIMIT
        - synchronization:
            elements:
              - response_timeout:
                  value: 1
              - interval:
                  value: 9999999
    - section: sca
      elements:
        - enabled:
            value: "no"
    - section: rootcheck
      elements:
        - disabled:
            value: "yes"
    - section: active-response
      elements:
        - disabled:
            value: "yes"
