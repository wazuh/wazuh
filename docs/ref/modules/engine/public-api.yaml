openapi: 3.0.3
info:
  title: Wazuh-Engine Public API
  description: Public-facing API endpoints of the Wazuh Engine. These endpoints are intended for external consumers such as wazuh-indexer in standalone mode.
  version: 1.0.0
servers:
- url: http+unix:/run/wazuh-server/analysis
  description: Wazuh server using Unix socket over HTTP
tags:
- name: Content
  description: Operations for managing content.
- name: Logtest
  description: Operations for testing of events.
- name: Metrics
  description: Operations for querying and controlling engine metrics.
paths:
  /content/validate/policy:
    post:
      tags:
      - Content
      summary: Validate a policy JSON payload
      description: "Validates a complete **policy JSON document** by importing it into a temporary namespace.\n\nThe payload must include a `policy` definition and its associated `resources`\n(decoders, integrations, kvdbs).\n\n## Validation strategy\n\nValidation has two phases depending on whether the policy contains integrations:\n\n- **Policy without integrations** (`policy.integrations` is empty): validated by\n  import alone. No tester entry is created or posted.\n- **Policy with integrations**: after import, a temporary tester entry is created\n  and posted to verify the policy can be fully instantiated by the Engine.\n\n## Effect on the persistent `\"testing\"` session\n\nThe `load_in_tester` flag and the policy `enabled` field jointly control what\nhappens to the persistent tester session named **\"testing\"**:\n\n| `load_in_tester` | Has integrations | `enabled` | Outcome |\n|------------------|-----------------|-----------|---------|\n| `false`          | any             | any\
        \       | Existing `\"testing\"` session is **not touched**. Temp resources are cleaned up. |\n| `true`           | no              | any       | Existing `\"testing\"` session and its namespace are **deleted**. No new session is created. |\n| `true`           | yes             | `true`    | Temp session is **promoted** to `\"testing\"`, replacing the old one (old namespace deleted). |\n| `true`           | yes             | `false`   | Temp session+namespace **and** the existing `\"testing\"` session+namespace are **deleted**. |\n\n## Notes\n- A unique temporary namespace and tester session are generated per request.\n- If the Tester API is not available, the request fails immediately.\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/policyValidate_Request'
            examples:
              validate_only:
                summary: Validate policy (with integrations), no persistent tester session
                value:
                  space: test
                  load_in_tester: false
                  full_policy:
                    policy:
                      title: <policy_name>
                      root_decoder: <decoder_uuid>
                      integrations:
                      - <integration_uuid>
                      filters:
                      - <filter_uuid>
                      outputs:
                      - <output_uuid>
                      enabled: true
                    resources:
                      decoders: []
                      integrations: []
                      kvdbs: []
                      filters: []
                      outputs: []
              validate_no_integrations:
                summary: Validate policy without integrations (import-only validation)
                value:
                  space: standard
                  load_in_tester: false
                  full_policy:
                    policy:
                      title: <policy_name>
                      integrations: []
                      enabled: true
                    resources:
                      decoders: []
                      integrations: []
                      kvdbs: []
                      filters: []
                      outputs: []
              validate_and_load_testing:
                summary: Validate and promote to 'testing' session (enabled policy with integrations)
                value:
                  load_in_tester: true
                  full_policy:
                    policy:
                      title: <policy_name>
                      root_decoder: <decoder_uuid>
                      integrations:
                      - <integration_uuid>
                      filters:
                      - <filter_uuid>
                      enabled: true
                    resources:
                      kvdbs:
                      - id: <kvdb_uuid>
                        title: <name>
                        enabled: true
                        content:
                          <key>: {}
                      decoders:
                      - id: <decoder_uuid>
                        name: decoder/<name>/<version>
                        enabled: true
                        normalize:
                        - map:
                          - '@timestamp': get_date()
                      integrations:
                      - id: <integration_uuid>
                        title: <name>
                        enabled: true
                        category: <category>
                        decoders:
                        - <decoder_uuid>
                        kvdbs:
                        - <kvdb_uuid>
                      filters:
                      - name: filter/prefilter/0
                        metadata:
                          description: Default filter to allow all events (for default ruleset)
                          author:
                            name: Wazuh, Inc.
                            url: https://wazuh.com
                            date: 2022/11/08
                        check: $host.os.platform == 'ubuntu'
                        type: pre-filter
                        enabled: true
                        id: <filter_uuid>
              validate_disabled_policy:
                summary: "Validate disabled policy \u2014 clears the existing 'testing' session"
                value:
                  load_in_tester: true
                  full_policy:
                    policy:
                      title: <policy_name>
                      root_decoder: <decoder_uuid>
                      integrations:
                      - <integration_uuid>
                      enabled: false
                    resources:
                      decoders: []
                      integrations: []
                      kvdbs: []
                      filters: []
                      outputs: []
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess_200'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                missing_full_policy:
                  summary: Missing or empty full_policy
                  value:
                    status: ERROR
                    error: Missing full policy
                tester_unavailable:
                  summary: Tester API is not available
                  value:
                    status: ERROR
                    error: Tester API is not available
                tester_post_failed:
                  summary: Failed creating temporary tester entry (policy with integrations)
                  value:
                    status: ERROR
                    error: 'Failed to create tester entry: <details>'
                tester_rename_failed:
                  summary: Failed promoting temp session to 'testing'
                  value:
                    status: ERROR
                    error: 'Failed to rename tester entry: <details>'
                cleanup_failed_session:
                  summary: "Strict cleanup failed \u2014 could not delete a session"
                  value:
                    status: ERROR
                    error: 'Cleanup: failed deleting session ''<name>'': <details>'
                cleanup_failed_namespace:
                  summary: "Strict cleanup failed \u2014 could not delete a namespace"
                  value:
                    status: ERROR
                    error: 'Cleanup: failed deleting namespace ''<name>'': <details>'
        '500':
          $ref: '#/components/responses/InternalServerError_500'
  /logtest:
    post:
      tags:
      - Logtest
      summary: Inject an event into an existing testing session
      description: "Injects a single event into the engine using a previously created and loaded testing session.\n\nThis endpoint **does not** validate policies and **does not** create sessions.\nIt only validates request parameters, parses/builds the event payload, and runs the test ingestion\nagainst the session identified by the `space` field.\n\nIf tracing is enabled (trace_level != NONE), the endpoint retrieves the list of policy assets\nfrom the specified testing session and uses them as the trace filter.\n\nAfter the pipeline finishes, the final output event is validated against the Wazuh Common\nSchema (WCS). Validation is **non-blocking**: the pipeline result is always returned\nregardless of validation errors. The result is reported in `result.validation` when the\nschema validator is available (see below).\n\nEach entry in `result.validation.errors` has:\n- `path` \u2014 field path using dot notation for nesting and `[N]` for array indices\n  (e.g. `\"event.severity\"`, `\"tags[1]\"\
        `, `\"hits[0].id\"`).\n- `kind` \u2014 one of:\n  - `unknown_field` \u2014 field is not defined in WCS and is not a temporary field.\n  - `invalid_type` \u2014 value does not match the WCS type for that field.\n- `expected` / `actual` \u2014 present only for `invalid_type` errors; both are type strings\n  (e.g. `\"keyword\"`, `\"object\"`, `\"number\"`).\n\nPipeline-internal temporary fields (root key starts with `_`) are cleaned before validation.\n\nAny WCS field can hold either a single value or an array of values of the same type.\nArrays are always unrolled: each element is validated individually using the field's\nschema type. This applies to scalar types (e.g. `keyword`), numeric types, and object\ntypes such as `nested` (array of objects). Only one error is reported per invalid element.\n\n`FLAT_OBJECT` and `GEO_POINT` fields are treated as opaque: their children are never visited.\n\n`result.validation` is only present when the schema validator is available and the\npipeline\
        \ produced an output event. If absent, no validation was performed.\n\nErrors are sorted by path, with kind as tiebreaker.\n\nNotes about event parsing:\n- `queue` indicates the queue to which the event will be sent.\n- `location` cannot be empty.\n- If `location` matches the legacy agent format (`\"[ID] (Name) IP->Module\"`), it is parsed and may\n  rewrite the final stored location to just the module.\n- If not legacy, host metadata is merged into the event before setting location/message.\n- `metadata` is **not required** and can be an empty **JSON object**, it can't be a JSON-encoded string, number, or array.\n  If `metadata` is present and it contains invalid nested fields, or includes top-level keys other than `wazuh`,\n  the request is rejected with a clear error message.\n- `metadata` is restricted to the top-level `wazuh` key. Arbitrary sibling fields such as `metadata.name` are not allowed.\n- `metadata.wazuh` must be a JSON object when present.\n  Use it to provide only\
        \ fields accepted by the Wazuh event schema.\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicRunPost_Request'
            examples:
              basic:
                summary: Basic run using queue 1
                value:
                  space: test
                  queue: 1
                  location: /var/log/auth.log
                  metadata:
                    wazuh:
                      agent:
                        name: AgentName
                  event: 'Dec 19 12:00:00 host sshd[123]: Failed password for root from 10.0.0.1 port 12345 ssh2'
                  trace_level: NONE
              with_trace:
                summary: Run with tracing enabled
                value:
                  space: test
                  queue: 1
                  location: '[001] (my-agent) 192.168.1.10->syslog'
                  metadata:
                    wazuh:
                      agent:
                        id: '001'
                  event: '<34>Dec 19 12:00:00 my-agent myapp: something happened'
                  trace_level: ALL
              metadata_wazuh_ok:
                summary: metadata with top-level `wazuh` object
                value:
                  space: test
                  queue: 1
                  location: syscheck
                  metadata:
                    wazuh:
                      host:
                        ip: 192.168.1.10
                  event: File /etc/passwd modified
                  trace_level: ALL
              metadata_wazuh_wrong_type:
                summary: INVALID - metadata with type missmatch
                value:
                  queue: 1
                  location: syscheck
                  metadata:
                    wazuh:
                      host:
                        ip: notAnIpAddress
                  event: File /etc/passwd modified
                  trace_level: ALL
              metadata_wazuh_nested_ok:
                summary: metadata can provide nested `wazuh` fields accepted by the event schema
                value:
                  space: test
                  queue: 1
                  location: syscheck
                  metadata:
                    wazuh:
                      agent:
                        id: '001'
                      labels:
                        kind: test
                  event: File /etc/passwd modified
                  trace_level: ALL
              metadata_wazuh_empty_valid:
                summary: VALID - empty wazuh metadata object
                value:
                  space: test
                  queue: 1
                  location: syscheck
                  metadata:
                    wazuh: {}
                  event: File /etc/passwd modified
                  trace_level: ALL
              metadata_empty_object_valid:
                summary: VALID - empty metadata object
                value:
                  queue: 1
                  location: syscheck
                  metadata: {}
                  event: File /etc/passwd modified
                  trace_level: ALL
              metadata_non_wazuh_key_invalid:
                summary: INVALID - non-`wazuh` top-level metadata fields are rejected
                value:
                  queue: 1
                  location: syscheck
                  metadata:
                    name: test-host
                  event: File /etc/passwd modified
                  trace_level: ALL
              metadata_as_string_invalid:
                summary: INVALID - metadata is a JSON-encoded string (Struct expects an object)
                value:
                  queue: 1
                  location: syscheck
                  metadata: '{"wazuh": {}}'
                  event: File /etc/passwd modified
                  trace_level: ALL
              missing_metadata_invalid:
                summary: INVALID - missing required metadata
                value:
                  space: test
                  queue: 1
                  location: syscheck
                  event: File /etc/passwd modified
                  trace_level: ALL
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TesterRunPost_Response'
              examples:
                ok_with_wazuh_metadata:
                  summary: OK - `metadata.wazuh` contributes Wazuh-scoped fields
                  value:
                    status: OK
                    result:
                      output:
                        wazuh:
                          protocol:
                            queue: 1
                            location: syscheck
                          integration:
                            category: Security
                            name: integration/wazuh-core/0
                            decoders:
                            - core-wazuh-message
                            - integrations
                          host:
                            name: test-host
                        event:
                          original: File /etc/passwd modified
                        '@timestamp': '2025-12-26T17:33:22Z'
                      asset_traces:
                      - asset: decoder/core-wazuh-message/0
                        success: true
                        traces:
                        - '@timestamp: get_date -> Success'
                      validation:
                        valid: true
                        errors: []
                ok_with_nested_wazuh_metadata:
                  summary: OK - populated `metadata.wazuh` is accepted
                  value:
                    status: OK
                    result:
                      output:
                        wazuh:
                          protocol:
                            queue: 1
                            location: syscheck
                          integration:
                            category: Security
                            name: integration/wazuh-core/0
                            decoders:
                            - core-wazuh-message
                            - integrations
                          agent:
                            id: '001'
                        event:
                          original: File /etc/passwd modified
                        '@timestamp': '2025-12-26T17:34:18Z'
                      asset_traces:
                      - asset: decoder/core-wazuh-message/0
                        success: true
                        traces:
                        - '@timestamp: get_date -> Success'
                      validation:
                        valid: true
                        errors: []
                ok_with_validation_errors:
                  summary: OK - pipeline ran but output has WCS validation errors (non-blocking)
                  value:
                    status: OK
                    result:
                      output:
                        wazuh:
                          protocol:
                            queue: 1
                            location: syscheck
                        event:
                          original: '...'
                          severity: 42
                        _tmp:
                          stage: done
                        unknown_field: value
                      asset_traces: []
                      validation:
                        valid: false
                        errors:
                        - path: event.severity
                          kind: invalid_type
                          expected: keyword
                          actual: number
                        - path: unknown_field
                          kind: unknown_field
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                invalid_queue:
                  summary: Queue out of allowed range (1..255)
                  value:
                    status: ERROR
                    error: 'Invalid queue: 300 (must be 1..255)'
                invalid_trace_level:
                  summary: Unsupported trace level
                  value:
                    status: ERROR
                    error: 'Invalid trace level: "VERBOSE". Supported: NONE, ASSET_ONLY, ALL'
                empty_location:
                  summary: Location cannot be empty
                  value:
                    status: ERROR
                    error: 'Error parsing event: Invalid format: location cannot be empty'
                event_parse_error:
                  summary: Protocol parsing failed
                  value:
                    status: ERROR
                    error: 'Error parsing event: <details>'
                metadata_wrong_type_struct:
                  summary: metadata must be an object (Struct); a string, number, or array is invalid
                  value:
                    status: ERROR
                    error: metadata is required and must be a JSON object
                metadata_unknown_top_level_field:
                  summary: metadata contains unsupported top-level fields
                  value:
                    status: ERROR
                    error: Metadata must be a non-empty object with 'wazuh' as root
        '500':
          $ref: '#/components/responses/InternalServerError_500'
    delete:
      tags:
      - Logtest
      summary: Cleanup logtest session and temporary namespace
      description: 'Stops and removes the logtest testing session for the given `space` (if any)

        and deletes the associated temporary namespace from storage, including all assets.


        This operation is safe and idempotent. If there is no active session or

        namespace to delete for the given space, it returns **OK**.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogtestDelete_Request'
            examples:
              cleanup_test:
                summary: Cleanup the test space
                value:
                  space: test
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                ok:
                  summary: Cleanup completed or nothing to delete
                  value:
                    status: OK
        '500':
          $ref: '#/components/responses/InternalServerError_500'
  /content/ioc/update:
    post:
      tags:
      - Content
      summary: Update IOCs from a file
      description: "Performs an asynchronous update of the Indicators of Compromise (IOCs) in the manager \nusing the provided file path and hash.\n\nThe file must be in **nd-json** (newline-delimited JSON) format, where each line \nrepresents a single IOC JSON object containing at minimum:\n- `name`: The IOC value (IP, domain, hash, etc.)\n- `type`: The IOC type (e.g., \"connection\", \"url_domain\", \"file_hash\")\n\n**Hash-based optimization**: The `hash` field (typically MD5) is used to skip the \nupdate if the file content hasn't changed since the last synchronization, improving \nefficiency and reducing unnecessary I/O operations.\n\n**Behavior**:\n- If the hash matches the previously stored hash, returns OK without performing sync.\n- If the hash differs, schedules an asynchronous synchronization task.\n- Only one synchronization can run at a time (enforced by internal semaphore).\n- Updates are performed using a hot-swap mechanism to avoid service interruption.\n\n**Error handling**:\n\
        - File path validation is performed before scheduling.\n- An empty `hash` field results in a 400 Bad Request (`Field /hash cannot be empty`).\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIoc_Request'
            examples:
              update_iocs:
                summary: Update IOCs from file with hash
                value:
                  path: /var/lib/wazuh-server/iocs/threat-intel.ndjson
                  hash: 5d41402abc4b2a76b9719d911017c592
      responses:
        '200':
          description: Success - Synchronization scheduled or skipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                sync_scheduled:
                  summary: Synchronization task scheduled successfully
                  value:
                    status: OK
                    error: null
                hash_match_no_sync:
                  summary: Hash matches, synchronization skipped
                  value:
                    status: OK
                    error: IOC data is already up to date
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                empty_path:
                  summary: Path field is empty
                  value:
                    status: ERROR
                    error: Field /path cannot be empty
                empty_hash:
                  summary: Hash field is empty
                  value:
                    status: ERROR
                    error: Field /hash cannot be empty
                file_not_found:
                  summary: File does not exist
                  value:
                    status: ERROR
                    error: 'File not found: /invalid/path/file.json'
                sync_in_progress:
                  summary: Another synchronization is already running
                  value:
                    status: ERROR
                    error: IOC synchronization already in progress
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                store_unavailable:
                  summary: Store service is not available
                  value:
                    status: ERROR
                    error: Store is not available
                scheduler_unavailable:
                  summary: Scheduler service is not available
                  value:
                    status: ERROR
                    error: Scheduler is not available
  /content/ioc/state:
    get:
      tags:
      - Content
      summary: Get IOC synchronization state
      description: 'Retrieves the current state of the IOC manager, including:

        - **hash**: MD5 hash of the last successfully synchronized IOC file

        - **updating**: Boolean indicating if a synchronization is currently in progress

        - **lastError**: Error message from the last failed synchronization (empty if last sync succeeded)


        This endpoint is useful for:

        - Monitoring IOC synchronization status

        - Checking if updates are being processed

        - Diagnosing synchronization failures

        - Verifying which IOC file version is currently active

        '
      responses:
        '200':
          description: Success - State retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetIocState_Response'
              examples:
                idle_state:
                  summary: No sync in progress, last sync successful
                  value:
                    status: OK
                    hash: 5d41402abc4b2a76b9719d911017c592
                    updating: false
                    lastError: ''
                syncing_state:
                  summary: Synchronization currently in progress
                  value:
                    status: OK
                    hash: 5d41402abc4b2a76b9719d911017c592
                    updating: true
                    lastError: ''
                error_state:
                  summary: Last synchronization failed
                  value:
                    status: OK
                    hash: abc123def456
                    updating: false
                    lastError: 'Failed to open file: /path/to/iocs.ndjson'
                initial_state:
                  summary: No IOCs synchronized yet
                  value:
                    status: OK
                    hash: ''
                    updating: false
                    lastError: ''
                store_error:
                  summary: Store is not available
                  value:
                    status: ERROR
                    hash: ''
                    updating: false
                    lastError: Store is not available
  /content/validate/resource:
    post:
      tags:
      - Content
      summary: Validate a content resource
      description: "This endpoint validates a content resource payload before storing it.\nIt validates the request schema and performs type-specific validation.\n\nThe validation is performed without requiring the full namespace context, so a resource can be checked\nindependently from other assets.\n\nThe request body must be a JSON object and the resource must include a valid UUIDv4 in the `resource.id` field.\nThe request body size can be limited through:\n- `analysisd.api_resource_payload_max_bytes`\n- `analysisd.api_resource_kvdb_payload_max_bytes`\n\nA value of `0` means unlimited for that limit. If the body exceeds a configured limit, the request is rejected\nwith HTTP 413.\n\n- **Integrations**:\n  - Validate schema.\n  - Validate `decoders[]` as UUIDv4 values.\n  - Validate `kvdbs[]` as UUIDv4 values.\n  - Validate category existence and validity.\n  - Validate `default_parent` as UUIDv4 (if present).\n- **KVDB**:\n  - Validate schema.\n  - Require `content` to be a JSON object.\n\
        - **Decoders**:\n  - Attempt decoder construction/compilation.\n  - Validation must not fail if referenced KVDBs are not present at validation time.\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentValidate_Request'
            examples:
              kvdb_validate:
                summary: Validate a KVDB resource
                value:
                  type: kvdb
                  resource:
                    id: 82e215c4-988a-4f64-8d15-b98b2fc03a4f
                    date: '2025-10-06T13:32:19Z'
                    title: windows_kerberos_status_code_to_code_name
                    author: Wazuh Inc.
                    content:
                      '0x0': KDC_ERR_NONE
                      '0x1': KDC_ERR_NAME_EXP
                      '0x2': KDC_ERR_SERVICE_EXP
                      '0x3': KDC_ERR_BAD_PVNO
                      '0x4': KDC_ERR_C_OLD_MAST_KVNO
                      '0x5': KDC_ERR_S_OLD_MAST_KVNO
                      '0x6': KDC_ERR_C_PRINCIPAL_UNKNOWN
                    enabled: true
              integration_validate_with_parent:
                summary: Validate an Integration resource (with optional default_parent)
                value:
                  type: integration
                  resource:
                    id: 5c1df6b6-1458-4b2e-9001-96f67a8b12c8
                    title: windows
                    enabled: true
                    category: Security
                    default_parent: 85853f26-5779-469b-86c4-c47ee7d400b4
                    decoders:
                    - 85853f26-5779-469b-86c4-c47ee7d400b4
                    - 4aa06596-5ba9-488c-8354-2475705e1257
                    - 4da71af3-fff5-4b67-90d6-51db9e15bc47
                    - 6f8bd7d2-8516-4b2b-a6f1-cc924513c404
                    kvdbs: []
              integration_validate_no_parent:
                summary: Validate an Integration resource (no default_parent)
                value:
                  type: integration
                  resource:
                    id: 5c1df6b6-1458-4b2e-9001-96f67a8b12c8
                    title: windows
                    enabled: false
                    category: Security
                    decoders:
                    - 85853f26-5779-469b-86c4-c47ee7d400b4
                    kvdbs: []
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess_200'
        '400':
          description: Bad Request. The request was malformed or failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                missing_type:
                  summary: Missing /type
                  value:
                    status: ERROR
                    error: Field /type is required
                unsupported_type:
                  summary: Unsupported /type
                  value:
                    status: ERROR
                    error: Unsupported value for /type
                invalid_json:
                  summary: Invalid JSON payload
                  value:
                    status: ERROR
                    error: Invalid JSON payload
                integration_invalid_category:
                  summary: Integration invalid category
                  value:
                    status: ERROR
                    error: Category 'ossec' is not a valid category for integration 'windows'.
        '500':
          $ref: '#/components/responses/InternalServerError_500'
  /metrics/enable:
    post:
      tags:
      - Metrics
      summary: Enable or disable a specific metric
      description: 'Enables or disables collection for a specific metric instrument.


        When disabled, the metric still exists and can be queried, but its value is

        no longer updated by the engine pipeline.


        **Space resolution**: if the `space` field is provided, the metric name is resolved

        internally as `space.<space>.<instrumentName>`. This allows consumers to reference

        per-space metrics by their short name (e.g., `events.discarded`) without knowing

        the internal naming convention.


        If `space` is omitted, `instrumentName` is used as-is (for global metrics like

        `router.events.processed`).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricsEnable_Request'
            examples:
              enable_global:
                summary: Enable a global metric
                value:
                  instrumentName: router.events.processed
                  status: true
              disable_per_space:
                summary: Disable a per-space metric
                value:
                  instrumentName: events.discarded
                  space: wazuh
                  status: false
      responses:
        '200':
          description: Metric enabled/disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                success:
                  summary: Metric enabled
                  value:
                    status: OK
                    error: null
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                not_found:
                  summary: Metric not found
                  value:
                    status: ERROR
                    error: Metric 'router.events.unknown' not found
        '500':
          $ref: '#/components/responses/InternalServerError_500'
  /metrics/get:
    post:
      tags:
      - Metrics
      summary: Get a single metric value and metadata
      description: 'Retrieves the current value, type, and enablement status of a single metric.


        **Space resolution**: if the `space` field is provided, the metric name is resolved

        internally as `space.<space>.<instrumentName>`.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricsGet_Request'
            examples:
              get_global:
                summary: Get a global metric
                value:
                  instrumentName: router.events.processed
              get_per_space:
                summary: Get a per-space metric
                value:
                  instrumentName: events.discarded
                  space: wazuh
      responses:
        '200':
          description: Metric value retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsGet_Response'
              examples:
                counter:
                  summary: Counter metric
                  value:
                    status: OK
                    name: router.events.processed
                    type: counter
                    enabled: true
                    value: 123456
                per_space:
                  summary: Per-space counter
                  value:
                    status: OK
                    name: space.wazuh.events.discarded
                    type: counter
                    enabled: true
                    value: 42
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                not_found:
                  summary: Metric not found
                  value:
                    status: ERROR
                    error: Metric 'unknown.metric' not found
        '500':
          $ref: '#/components/responses/InternalServerError_500'
  /metrics/list:
    post:
      tags:
      - Metrics
      summary: List all registered metric names
      description: 'Returns the names of all registered metrics.


        If `space` is provided, only metrics belonging to that space are returned

        (those matching the internal prefix `space.<space>.`).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricsList_Request'
            examples:
              list_all:
                summary: List all metrics
                value: {}
              list_space:
                summary: List metrics for a specific space
                value:
                  space: wazuh
      responses:
        '200':
          description: Metric names retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsList_Response'
              examples:
                all_metrics:
                  summary: All registered metrics
                  value:
                    status: OK
                    names:
                    - router.events.processed
                    - router.eps.1m
                    - router.eps.5m
                    - router.eps.30m
                    - router.queue.size
                    - router.queue.usage.percent
                    - server.events.dropped.input
                    - space.wazuh.events.discarded
                    - space.wazuh.events.unclassified
                    - space.wazuh.events.discarded.prefilter
                    - space.wazuh.events.discarded.postfilter
                    - space.wazuh.events.dropped.output
                space_filtered:
                  summary: Only metrics for space 'wazuh'
                  value:
                    status: OK
                    names:
                    - space.wazuh.events.discarded
                    - space.wazuh.events.unclassified
                    - space.wazuh.events.discarded.prefilter
                    - space.wazuh.events.discarded.postfilter
                    - space.wazuh.events.dropped.output
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                invalid_space:
                  summary: Space not found
                  value:
                    status: ERROR
                    error: No metrics found for space 'nonexistent'
        '500':
          $ref: '#/components/responses/InternalServerError_500'
  /metrics/dump:
    post:
      tags:
      - Metrics
      summary: Dump all metrics with their current values
      description: "Returns a full snapshot of all registered metrics, organized into two groups:\n\n- **`global`**: engine-wide metrics not scoped to any specific space\n  (e.g., `router.events.processed`, `router.eps.1m`).\n- **`spaces`**: per-space metrics grouped by space name. The internal prefix\n  `space.<name>.` is stripped from metric names for readability.\n\nThe response also includes:\n- **`name`**: daemon identifier (e.g., `wazuh-manager-analysisd`)\n- **`uptime`**: ISO 8601 timestamp of when the daemon started\n- **`timestamp`**: ISO 8601 timestamp of when the dump was collected\n\nThis endpoint is designed for monitoring dashboards and observability tools.\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: "Empty request body \u2014 dumps all metrics"
            examples:
              dump_all:
                summary: Dump all metrics
                value: {}
      responses:
        '200':
          description: Full metrics dump
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsDump_Response'
              examples:
                full_dump:
                  summary: Complete metrics dump with global and per-space metrics
                  value:
                    status: OK
                    name: wazuh-manager-analysisd
                    uptime: '2024-01-15T10:30:00Z'
                    timestamp: '2024-01-15T12:45:30Z'
                    global:
                    - name: router.events.processed
                      type: counter
                      enabled: true
                      value: 500000
                    - name: router.queue.size
                      type: pull
                      enabled: true
                      value: 42
                    - name: server.events.dropped.input
                      type: counter
                      enabled: true
                      value: 3
                    spaces:
                    - name: wazuh
                      metrics:
                      - name: events.discarded
                        type: counter
                        enabled: true
                        value: 120
                      - name: events.unclassified
                        type: counter
                        enabled: true
                        value: 15
                      - name: events.discarded.prefilter
                        type: counter
                        enabled: true
                        value: 80
                      - name: events.discarded.postfilter
                        type: counter
                        enabled: true
                        value: 40
                      - name: events.dropped.output
                        type: counter
                        enabled: true
                        value: 2
        '500':
          $ref: '#/components/responses/InternalServerError_500'
components:
  schemas:
    ReturnStatus:
      type: string
      enum:
      - UNKNOWN
      - OK
      - ERROR
      description: Status codes representing different return states.
    ReturnError:
      type: string
      description: Error message if status is ERROR
      nullable: true
    Response:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ReturnStatus'
        error:
          $ref: '#/components/schemas/ReturnError'
    EmptyRequest:
      type: object
      description: Empty request body
      properties: {}
    ResourceName:
      type: string
      description: Name of the resource, a '/' separated string. Where the first part is the type, the second part is the name, and the last part is the version.
      example: type/name/0
    Namespace:
      type: string
      description: Namespace where the policy and assets are located
      example: namespace1
    Result_ValidationError:
      type: object
      properties:
        path:
          type: string
          description: Field path using dot notation for nesting and [N] for array indices (e.g. "event.severity", "tags[1]")
        kind:
          type: string
          enum:
          - unknown_field
          - invalid_type
          - temporary_field_not_allowed
          description: 'Type of validation error:

            - `unknown_field`: field is not defined in WCS and is not a temporary field.

            - `invalid_type`: value does not match the WCS type for that field.

            - `temporary_field_not_allowed`: field is a pipeline-internal field (root starts with `_`).

            '
        expected:
          type: string
          nullable: true
          description: Expected WCS type string. Only present for `invalid_type` errors (e.g. "keyword", "long").
        actual:
          type: string
          nullable: true
          description: Actual JSON type string of the value. Only present for `invalid_type` errors (e.g. "number", "object").
    Result_Validation:
      type: object
      properties:
        valid:
          type: boolean
          description: True when the output event contains no WCS validation errors.
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Result_ValidationError'
          description: List of WCS validation errors found in the output event. Empty when valid is true. Sorted by path (alphabetical); kind is used as tiebreaker when two errors share the same path.
    TesterResult:
      type: object
      properties:
        output:
          type: object
          description: JSON output of the event
        asset_traces:
          type: array
          items:
            type: object
            properties:
              asset:
                $ref: '#/components/schemas/ResourceName'
              success:
                type: boolean
                description: If the asset was successfully decoded
              traces:
                type: array
                items:
                  type: string
                description: Traces of the asset
        validation:
          $ref: '#/components/schemas/Result_Validation'
          description: WCS schema validation result. Present in tester-run and logtest responses, only when the schema validator is available and the pipeline produced an output event.
          nullable: true
    TesterRunPost_Response:
      allOf:
      - $ref: '#/components/schemas/Response'
      - type: object
        properties:
          result:
            $ref: '#/components/schemas/TesterResult'
    policyValidate_Request:
      type: object
      required:
      - full_policy
      - space
      properties:
        space:
          type: string
          description: Target space/session name (e.g. test, standard). Determines which tester session to promote into.
        load_in_tester:
          type: boolean
          description: If true, load testing policies into the Tester environment.
        full_policy:
          type: object
          description: Full policy JSON payload
    UpdateIoc_Request:
      type: object
      required:
      - path
      - hash
      properties:
        path:
          type: string
          description: Absolute path to the ndjson file containing IOCs to synchronize
          example: /var/lib/wazuh-server/iocs/threat-intel.ndjson
        hash:
          type: string
          description: MD5 hash of the IOC file. Required for change detection and skipping unnecessary syncs.
          example: 5d41402abc4b2a76b9719d911017c592
    GetIocState_Response:
      allOf:
      - $ref: '#/components/schemas/Response'
      - type: object
        properties:
          hash:
            type: string
            description: MD5 hash of the current IOCs in the manager
            example: 5d41402abc4b2a76b9719d911017c592
          updating:
            type: boolean
            description: Indicates if an IOC synchronization is currently in progress
            example: false
          lastError:
            type: string
            description: Error message from last failed synchronization. Empty if last sync succeeded.
            example: ''
    PublicRunPost_Request:
      type: object
      required:
      - queue
      - location
      - metadata
      - event
      - trace_level
      - space
      properties:
        space:
          type: string
          description: Target space/session name to run against (e.g. test, standard)
        queue:
          type: integer
          minimum: 1
          maximum: 255
          description: Queue number where the event will be injected (engine/input queue)
        location:
          type: string
          description: Event source/location label (e.g., file path, agent name, or custom identifier)
        metadata:
          type: object
          description: 'Required metadata object. Only the top-level `wazuh` key is allowed, and `metadata.wazuh` must be an object. The minimal accepted value is `{ "wazuh": {} }`.'
        event:
          type: string
          description: Raw event payload to test
        trace_level:
          type: string
          enum:
          - NONE
          - ASSET_ONLY
          - ALL
          description: Level of traces
    LogtestDelete_Request:
      type: object
      required:
      - space
      properties:
        space:
          type: string
          description: Target space/session name to delete (e.g. test, standard)
    ContentValidate_Request:
      type: object
      required:
      - type
      - resource
      properties:
        type:
          type: string
          enum:
          - decoder
          - filter
          - integration
          - kvdb
        resource:
          type: object
          description: JSON object of the resource to validate
    MetricsEnable_Request:
      type: object
      properties:
        instrumentName:
          type: string
          description: Metric name. For global metrics use the full name (e.g., 'router.events.processed'). For per-space metrics use the short name (e.g., 'events.discarded') along with the `space` field.
        status:
          type: boolean
          description: true = enable collection, false = disable collection. Defaults to true.
          default: true
        space:
          type: string
          description: Space name (policy/namespace). When set, the metric is resolved internally as 'space.<space>.<instrumentName>'.
    MetricsGet_Request:
      type: object
      properties:
        instrumentName:
          type: string
          description: Metric name. For global metrics use the full name. For per-space metrics use the short name along with the `space` field.
        space:
          type: string
          description: Space name. When set, the metric is resolved internally as 'space.<space>.<instrumentName>'.
    MetricsGet_Response:
      allOf:
      - $ref: '#/components/schemas/Response'
      - type: object
        properties:
          name:
            type: string
            description: Resolved metric name (full internal name, e.g., 'space.wazuh.events.discarded')
          type:
            type: string
            description: Metric type as string
            enum:
            - counter
            - gauge_int
            - pull
          enabled:
            type: boolean
            description: Whether metric collection is currently enabled
          value:
            type: number
            description: Current metric value
    MetricsList_Request:
      type: object
      properties:
        space:
          type: string
          description: If set, list only metrics belonging to this space (filters by internal prefix 'space.<space>.')
    MetricsList_Response:
      allOf:
      - $ref: '#/components/schemas/Response'
      - type: object
        properties:
          names:
            type: array
            items:
              type: string
            description: List of registered metric names matching the filter
    MetricEntry:
      type: object
      description: A single metric with its current value and metadata
      properties:
        name:
          type: string
          description: 'Metric name. For global metrics: full name. For per-space metrics: suffix without the ''space.<name>.'' prefix.'
        type:
          type: string
          description: Metric type as string
          enum:
          - counter
          - gauge_int
          - pull
        enabled:
          type: boolean
          description: Whether metric collection is currently enabled
        value:
          type: number
          description: Current metric value
    SpaceMetrics:
      type: object
      description: Metrics grouped by space (policy/namespace)
      properties:
        name:
          type: string
          description: Space name (e.g., 'wazuh', 'testing')
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/MetricEntry'
          description: Metrics belonging to this space
    MetricsDump_Response:
      allOf:
      - $ref: '#/components/schemas/Response'
      - type: object
        properties:
          name:
            type: string
            description: Daemon name (e.g., 'wazuh-manager-analysisd')
          uptime:
            type: string
            format: date-time
            description: ISO 8601 timestamp of when the daemon started
          timestamp:
            type: string
            format: date-time
            description: ISO 8601 timestamp of when this dump was collected
          global:
            type: array
            items:
              $ref: '#/components/schemas/MetricEntry'
            description: Global metrics (engine-wide, not scoped to any space)
          spaces:
            type: array
            items:
              $ref: '#/components/schemas/SpaceMetrics'
            description: Per-space metrics grouped by space name
  responses:
    InternalServerError_500:
      description: Internal Server Error
      content:
        text/plain:
          schema:
            type: string
            description: Internal server error message
          example: 'Internal Server Error

            '
    BadRequest_400:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Response'
          example:
            status: ERROR
            error: Error message
    GenericSuccess_200:
      description: Generic Success
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Response'
          example:
            status: OK
            error: null
